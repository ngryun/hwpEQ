<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HWP 수식 변환기</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #fdf8f4;
    --surface: #ffffff;
    --surface2: #faf5f0;
    --border: #f0e4da;
    --pink: #d4849a;
    --pink-glow: #d4849a20;
    --accent: #b07aaf;
    --text: #3d3535;
    --text-dim: #9a8a85;
    --radius: 16px;
  }

  body {
    font-family: 'Inter', 'Noto Sans KR', sans-serif;
    background: linear-gradient(180deg, #fdf8f4 0%, #fef0f0 40%, #fdf5f0 100%);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* ── Cherry Blossom Canvas ── */
  #sakura-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  /* ── Main Layout ── */
  .app {
    position: relative;
    z-index: 1;
    max-width: 960px;
    margin: 0 auto;
    padding: 40px 24px 60px;
  }

  /* ── Header ── */
  .header {
    text-align: center;
    margin-bottom: 48px;
  }
  .header h1 {
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #f2a0b7, #c084fc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header p {
    color: var(--text-dim);
    font-size: 0.9rem;
    margin-top: 8px;
    font-weight: 300;
  }

  /* ── Mode Toggle ── */
  .mode-toggle {
    display: flex;
    justify-content: center;
    gap: 4px;
    margin-bottom: 32px;
    background: var(--surface);
    border-radius: 12px;
    padding: 4px;
    width: fit-content;
    margin-left: auto;
    margin-right: auto;
    border: 1px solid var(--border);
  }
  .mode-btn {
    padding: 10px 24px;
    border: none;
    border-radius: 10px;
    background: transparent;
    color: var(--text-dim);
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s ease;
    font-family: inherit;
  }
  .mode-btn.active {
    background: linear-gradient(135deg, #f8dde4, #f0d4ef);
    color: var(--pink);
    box-shadow: 0 4px 12px var(--pink-glow);
  }
  .mode-btn:hover:not(.active) {
    color: var(--text);
  }

  /* ── Converter Panel ── */
  .converter {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 16px;
    align-items: stretch;
    margin-bottom: 32px;
  }
  @media (max-width: 700px) {
    .converter {
      grid-template-columns: 1fr;
    }
    .arrow-col { transform: rotate(90deg); }
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    display: flex;
    flex-direction: column;
    transition: border-color 0.3s;
  }
  .panel {
    box-shadow: 0 2px 12px rgba(0,0,0,0.04);
  }
  .panel:focus-within {
    border-color: var(--pink);
    box-shadow: 0 4px 20px var(--pink-glow);
  }
  .panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .panel-label {
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
  }
  .copy-btn {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 5px 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface2);
    color: var(--text-dim);
    font-size: 0.7rem;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.25s;
  }
  .copy-btn:hover {
    border-color: var(--pink);
    color: var(--pink);
    background: #fef5f7;
  }
  .copy-btn.copied {
    border-color: #86c68a;
    color: #5a9e5e;
    background: #f0faf0;
  }
  .copy-btn svg {
    width: 13px; height: 13px;
    fill: none;
    stroke: currentColor;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .panel textarea {
    flex: 1;
    min-height: 140px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    color: var(--text);
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    font-size: 0.9rem;
    resize: vertical;
    outline: none;
    transition: border-color 0.3s;
    line-height: 1.6;
  }
  .panel textarea:focus {
    border-color: var(--pink);
  }
  .panel textarea::placeholder {
    color: var(--text-dim);
    opacity: 0.5;
  }

  /* ── Arrow ── */
  .arrow-col {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .arrow-btn {
    width: 48px; height: 48px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--pink);
    font-size: 1.2rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s;
  }
  .arrow-btn:hover {
    background: linear-gradient(135deg, #f8dde4, #f0d4ef);
    box-shadow: 0 4px 16px var(--pink-glow);
    transform: scale(1.1);
  }
  .arrow-btn svg {
    width: 20px; height: 20px;
    fill: none;
    stroke: currentColor;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* ── Preview ── */
  .preview-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    min-height: 80px;
    text-align: center;
  }
  .preview-label {
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    margin-bottom: 16px;
  }
  .preview-content {
    font-size: 1.4rem;
    color: var(--text);
    overflow-x: auto;
    padding: 8px 0;
  }
  .preview-content .katex { font-size: 1.6em; }
  .preview-error {
    color: #f87171;
    font-size: 0.85rem;
    font-style: italic;
  }

  /* ── Examples ── */
  .examples {
    margin-top: 32px;
  }
  .examples-title {
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    margin-bottom: 12px;
    text-align: center;
  }
  .example-chips {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
  }
  .example-chip {
    padding: 8px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text-dim);
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.3s;
    font-family: 'JetBrains Mono', monospace;
  }
  .example-chip:hover {
    border-color: var(--pink);
    color: var(--pink);
    background: #fef5f7;
    box-shadow: 0 2px 10px var(--pink-glow);
  }

  /* ── Footer ── */
  .footer {
    margin-top: 48px;
    color: var(--text-dim);
    font-size: 0.75rem;
  }
  .license-box {
    background: rgba(255,255,255,0.72);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 18px;
    text-align: left;
    line-height: 1.65;
    box-shadow: 0 2px 12px rgba(0,0,0,0.03);
  }
  .license-title {
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text);
    margin-bottom: 8px;
  }
  .license-box p + p {
    margin-top: 8px;
  }
  .footer a {
    color: var(--pink);
    text-decoration: none;
  }
</style>
</head>
<body>

<svg id="sakura-canvas"></svg>

<div class="app">
  <div class="header">
    <h1>HWP 수식 변환기</h1>
    <p>한글(HWP) 수식과 LaTeX를 간편하게 변환하세요</p>
  </div>

  <div class="mode-toggle">
    <button class="mode-btn" data-mode="hwp2latex">HWP &rarr; LaTeX</button>
    <button class="mode-btn active" data-mode="latex2hwp">LaTeX &rarr; HWP</button>
  </div>

  <div class="converter">
    <div class="panel" id="input-panel">
      <div class="panel-header">
        <div class="panel-label" id="input-label">HWP Equation</div>
        <button class="copy-btn" id="copy-input" title="Copy">
          <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          <span>Copy</span>
        </button>
      </div>
      <textarea id="input-area" placeholder="x times 3 + y^2 over z" spellcheck="false"></textarea>
    </div>
    <div class="arrow-col">
      <button class="arrow-btn" id="convert-btn" title="Convert">
        <svg viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
      </button>
    </div>
    <div class="panel" id="output-panel">
      <div class="panel-header">
        <div class="panel-label" id="output-label">LaTeX</div>
        <button class="copy-btn" id="copy-output" title="Copy">
          <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          <span>Copy</span>
        </button>
      </div>
      <textarea id="output-area" readonly placeholder="Result will appear here..." spellcheck="false"></textarea>
    </div>
  </div>

  <div class="preview-section">
    <div class="preview-label">Math Preview</div>
    <div class="preview-content" id="preview"></div>
  </div>

  <div class="examples">
    <div class="examples-title">Examples</div>
    <div class="example-chips" id="example-chips"></div>
  </div>

  <div class="footer">
    <div class="license-box">
      <div class="license-title">Licenses & Credits</div>
      <p>본 제품은 한글과컴퓨터의 한글 문서 파일(.hwp) 공개 문서를 참고하여 개발하였습니다. 관련 문서는 <a href="https://cdn.hancom.com/link/docs/%ED%95%9C%EA%B8%80%EB%AC%B8%EC%84%9C%ED%8C%8C%EC%9D%BC%ED%98%95%EC%8B%9D_%EC%88%98%EC%8B%9D_revision1.3.pdf" target="_blank" rel="noopener noreferrer">한글 문서 파일 형식 - 수식</a>에서 확인할 수 있습니다.</p>
      <p>수식 렌더링은 <a href="https://katex.org/" target="_blank" rel="noopener noreferrer">KaTeX</a>를 사용하며, KaTeX는 <a href="https://github.com/KaTeX/KaTeX/blob/main/LICENSE" target="_blank" rel="noopener noreferrer">MIT License</a>로 배포됩니다.</p>
    </div>
  </div>

</div>

<script>
// ═══════════════════════════════════════════════════════════
// Cherry Blossom Particle System (SVG + mouse wind)
// ═══════════════════════════════════════════════════════════
(function() {
  const svg = document.getElementById('sakura-canvas');
  const NS = 'http://www.w3.org/2000/svg';
  let W = window.innerWidth, H = window.innerHeight;
  let mouseX = W / 2, mouseY = H / 2;
  let mouseVX = 0, mouseVY = 0;
  let prevMouseX = mouseX, prevMouseY = mouseY;

  // Ambient wind — constant gentle breeze blowing diagonally
  let ambientWindX = 0.4, ambientWindY = 0.1;
  // Gust system — occasional stronger wind bursts
  let gustX = 0, gustY = 0, gustTimer = 0, gustDuration = 0;
  // Mouse-driven wind
  let mouseWindX = 0, mouseWindY = 0;

  window.addEventListener('resize', () => { W = window.innerWidth; H = window.innerHeight; });
  window.addEventListener('mousemove', e => {
    prevMouseX = mouseX; prevMouseY = mouseY;
    mouseX = e.clientX; mouseY = e.clientY;
    mouseVX = mouseX - prevMouseX;
    mouseVY = mouseY - prevMouseY;
  });

  // SVG defs for blur layers
  const defs = document.createElementNS(NS, 'defs');
  // Near layer blur (large petals, slightly soft)
  const filterNear = document.createElementNS(NS, 'filter');
  filterNear.setAttribute('id', 'blur-near');
  const feNear = document.createElementNS(NS, 'feGaussianBlur');
  feNear.setAttribute('stdDeviation', '0.8');
  filterNear.appendChild(feNear);
  defs.appendChild(filterNear);
  // Far layer blur (small petals, more blur)
  const filterFar = document.createElementNS(NS, 'filter');
  filterFar.setAttribute('id', 'blur-far');
  const feFar = document.createElementNS(NS, 'feGaussianBlur');
  feFar.setAttribute('stdDeviation', '1.5');
  filterFar.appendChild(feFar);
  defs.appendChild(filterFar);
  svg.appendChild(defs);

  function createPetalShape(depth) {
    const g = document.createElementNS(NS, 'g');
    const petal = document.createElementNS(NS, 'path');
    // Vary size by depth: far=small, near=large
    const baseSize = depth < 0.33 ? (3 + Math.random() * 3) :
                     depth < 0.66 ? (5 + Math.random() * 5) :
                                    (8 + Math.random() * 7);
    const s = baseSize;
    // Organic petal shape
    petal.setAttribute('d', `M0,0 C${s*0.35},${-s*0.55} ${s*1.05},${-s*0.25} ${s*0.55},${s*0.25} C${s*0.25},${s*0.55} ${s*0.08},${s*0.3} 0,0 Z`);

    const hue = 335 + Math.random() * 18;
    const sat = 50 + Math.random() * 35;
    const light = 78 + Math.random() * 14;
    // Opacity varies by depth: far petals are more transparent
    const alpha = depth < 0.33 ? (0.15 + Math.random() * 0.15) :
                  depth < 0.66 ? (0.25 + Math.random() * 0.2) :
                                 (0.35 + Math.random() * 0.25);
    petal.setAttribute('fill', `hsla(${hue}, ${sat}%, ${light}%, ${alpha})`);
    g.appendChild(petal);

    // Subtle vein
    const vein = document.createElementNS(NS, 'line');
    vein.setAttribute('x1', '0'); vein.setAttribute('y1', '0');
    vein.setAttribute('x2', String(s * 0.4)); vein.setAttribute('y2', String(s * 0.06));
    vein.setAttribute('stroke', `hsla(${hue}, 70%, 90%, ${alpha * 0.3})`);
    vein.setAttribute('stroke-width', '0.3');
    g.appendChild(vein);

    // Apply blur based on depth
    if (depth < 0.33) g.setAttribute('filter', 'url(#blur-far)');
    else if (depth > 0.8) g.setAttribute('filter', 'url(#blur-near)');

    return g;
  }

  const PETAL_COUNT = 120;
  const petals = [];

  for (let i = 0; i < PETAL_COUNT; i++) {
    const depth = Math.random(); // 0=far, 1=near
    const el = createPetalShape(depth);
    svg.appendChild(el);

    // Speed scales with depth (parallax)
    const speedMul = 0.3 + depth * 0.7;

    petals.push({
      el, depth, speedMul,
      x: Math.random() * (W + 400) - 200,
      y: Math.random() * (H + 200) - 200,
      vx: 0, vy: 0,
      // Rotation on Z axis (2D rotation)
      rotZ: Math.random() * 360,
      rotZSpeed: (Math.random() - 0.5) * 0.6,
      // Simulated 3D tumble via scaleX oscillation
      flipPhase: Math.random() * Math.PI * 2,
      flipSpeed: 0.3 + Math.random() * 0.8,
      // Spiral / swirl motion
      swirlPhase: Math.random() * Math.PI * 2,
      swirlSpeed: 0.15 + Math.random() * 0.35,
      swirlRadius: 8 + Math.random() * 20,
      // Base fall speed (very gentle)
      baseFallSpeed: (0.1 + Math.random() * 0.2) * speedMul,
      // Base drift speed (horizontal)
      baseDriftSpeed: (0.15 + Math.random() * 0.3) * speedMul,
      scale: depth < 0.33 ? 0.4 + Math.random() * 0.3 :
             depth < 0.66 ? 0.6 + Math.random() * 0.4 :
                            0.8 + Math.random() * 0.5
    });
  }

  let time = 0;
  function animate() {
    time += 0.016;

    // Mouse wind — smooth follow
    mouseWindX += (mouseVX * 0.08 - mouseWindX) * 0.02;
    mouseWindY += (mouseVY * 0.04 - mouseWindY) * 0.02;
    mouseVX *= 0.95; mouseVY *= 0.95;

    // Ambient wind gentle oscillation
    ambientWindX = 0.35 + Math.sin(time * 0.1) * 0.15;
    ambientWindY = 0.05 + Math.sin(time * 0.07 + 1.5) * 0.05;

    // Random gust system
    gustTimer -= 0.016;
    if (gustTimer <= 0) {
      // Trigger a new gust
      gustDuration = 2 + Math.random() * 4;
      gustTimer = gustDuration + 5 + Math.random() * 12; // wait before next gust
      const angle = Math.random() * Math.PI * 0.5 - Math.PI * 0.25; // mostly rightward
      const strength = 0.5 + Math.random() * 1.5;
      gustX = Math.cos(angle) * strength;
      gustY = Math.sin(angle) * strength * 0.3;
    }
    // Gust fades in and out
    let gustFade = 0;
    const gustAge = gustDuration - (gustTimer - (5 + 6)); // approximate
    if (gustTimer > 5) {
      // During gust
      const elapsed = gustDuration - (gustTimer - 5 - Math.random() * 7);
      gustFade = Math.sin(Math.min(1, Math.max(0, (gustDuration - (gustTimer - 5)) / gustDuration)) * Math.PI);
    }
    // Simpler: fade gust based on remaining time above threshold
    const inGust = gustTimer > 5;
    if (inGust) {
      const progress = 1 - (gustTimer - 5) / gustDuration;
      gustFade = Math.sin(progress * Math.PI); // 0 -> 1 -> 0
    } else {
      gustFade = 0;
    }

    const totalWindX = ambientWindX + gustX * gustFade + mouseWindX;
    const totalWindY = ambientWindY + gustY * gustFade + mouseWindY;

    for (const p of petals) {
      // Wind influence (depth-based: near petals react more)
      const windInfluence = p.speedMul;

      // Swirl motion — creates spiraling paths
      const swirlX = Math.sin(time * p.swirlSpeed + p.swirlPhase) * p.swirlRadius * 0.008 * windInfluence;
      const swirlY = Math.cos(time * p.swirlSpeed * 0.7 + p.swirlPhase) * p.swirlRadius * 0.004 * windInfluence;

      // Mouse proximity push (gentle)
      const distX = p.x - mouseX;
      const distY = p.y - mouseY;
      const dist = Math.sqrt(distX * distX + distY * distY);
      const mouseInfluence = Math.max(0, 1 - dist / 200) * 0.02;
      const pushX = distX * mouseInfluence;
      const pushY = distY * mouseInfluence;

      // Accumulate velocity
      p.vx += (totalWindX * windInfluence * 0.015) + swirlX + pushX;
      p.vy += (p.baseFallSpeed * 0.03) + (totalWindY * windInfluence * 0.01) + swirlY + pushY;

      // Damping
      p.vx *= 0.97;
      p.vy *= 0.98;

      // Clamp
      const maxSpeed = 1.5 * p.speedMul;
      p.vx = Math.max(-maxSpeed, Math.min(maxSpeed, p.vx));
      p.vy = Math.max(-0.5, Math.min(maxSpeed * 0.8, p.vy));

      // Position update
      p.x += p.vx + p.baseDriftSpeed * totalWindX * 0.3;
      p.y += p.vy + p.baseFallSpeed;

      // Z rotation (tumble)
      p.rotZ += p.rotZSpeed + totalWindX * windInfluence * 0.3;

      // 3D flip simulation (scaleX oscillation)
      const flip = Math.cos(time * p.flipSpeed + p.flipPhase);
      const scaleX = p.scale * (0.3 + Math.abs(flip) * 0.7);
      const scaleY = p.scale;

      // Wrap around — generous margins
      if (p.y > H + 60) { p.y = -60 - Math.random() * 100; p.x = Math.random() * (W + 400) - 200; }
      if (p.x > W + 100) { p.x = -80; p.y = Math.random() * H * 0.5; }
      if (p.x < -100) { p.x = W + 80; p.y = Math.random() * H * 0.5; }

      p.el.setAttribute('transform',
        `translate(${p.x.toFixed(1)},${p.y.toFixed(1)}) rotate(${p.rotZ.toFixed(1)}) scale(${scaleX.toFixed(2)},${scaleY.toFixed(2)})`
      );
    }

    requestAnimationFrame(animate);
  }
  animate();
})();

// ═══════════════════════════════════════════════════════════
// HWP-EQN-TS Library (bundled as plain JS)
// ═══════════════════════════════════════════════════════════
const TokenType = { KEYWORD: 0, IDENT: 1, NUMBER: 2, SYMBOL: 3, SPACE: 4, EOF: 5, UNKNOWN: 6 };

function isAlpha(ch) { return /^[A-Za-z]$/.test(ch); }
function isDigit(ch) { return /^[0-9]$/.test(ch); }
function isOpenDelimiter(ch) { return "([{|".includes(ch); }
function isCloseDelimiter(ch) { return ")]}|".includes(ch); }
function matchingDelimiter(ch) {
  return { "(": ")", "[": "]", "{": "}", "|": "|" }[ch] || "";
}

const HWP_KEYWORDS = new Set([
  "TIMES","OVER","ATOP","SQRT","INT","OINT","SUM","PROD","LIM",
  "UNION","INTER","SMALLUNION","SMALLINTER",
  "ACUTE","GRAVE","DOT","DDOT","BAR","VEC","DYAD","UNDER",
  "HAT","ARCH","CHECK","TILDE","LEFT","RIGHT",
  "MATRIX","PMATRIX","BMATRIX","DMATRIX","CASES",
  "PILE","LPILE","RPILE","EQALIGN",
  "CHOOSE","BINOM","NOT","REL","BUILDREL","BIGG","COL","LCOL","RCOL",
  "RM","IT","BOLD","RMBOLD"

const LATEX_KEYWORDS = new Set([

function tokenizeHwpEqn(input) {
  const tokens = [];
  let i = 0;
  while (i < input.length) {
    const ch = input[i];
    if (/\s/.test(ch)) { tokens.push({ type: TokenType.SPACE, value: ch }); i++; continue; }
    if (isDigit(ch)) {
      let num = ch;
      i++;
      while (i < input.length && isDigit(input[i])) { num += input[i]; i++; }
      if (i < input.length && input[i] === "." && i + 1 < input.length && isDigit(input[i + 1])) {
        num += input[i];
        i++;
        while (i < input.length && isDigit(input[i])) { num += input[i]; i++; }
      }
      tokens.push({ type: TokenType.NUMBER, value: num });
      continue;
    }
    if ("^_{}()#&~'/,.-+=*\\[]<>|\"".includes(ch)) {
      if (ch === "\\" && i + 1 < input.length && input[i + 1] === "\\") {
        tokens.push({ type: TokenType.SYMBOL, value: "\\\\" });
        i += 2;
        continue;
      }
      tokens.push({ type: TokenType.SYMBOL, value: ch });
      i++;
      continue;
    }
    if (isAlpha(ch)) {
      let ident = ch;
      i++;
      while (i < input.length && isAlpha(input[i])) { ident += input[i]; i++; }
      const up = ident.toUpperCase();
      if (HWP_KEYWORDS.has(up)) tokens.push({ type: TokenType.KEYWORD, value: up });
      else tokens.push({ type: TokenType.IDENT, value: ident });
      continue;
    }
    tokens.push({ type: TokenType.UNKNOWN, value: ch });
    i++;
  }
  tokens.push({ type: TokenType.EOF, value: "" });
  return tokens;
}

function tokenizeLatex(input) {
  const tokens = [];
  let i = 0;
  while (i < input.length) {
    const ch = input[i];
    if (/\s/.test(ch)) { tokens.push({ type: TokenType.SPACE, value: ch }); i++; continue; }
    if (isDigit(ch)) {
      let num = ch;
      i++;
      while (i < input.length && isDigit(input[i])) { num += input[i]; i++; }
      if (i < input.length && input[i] === "." && i + 1 < input.length && isDigit(input[i + 1])) {
        num += input[i];
        i++;
        while (i < input.length && isDigit(input[i])) { num += input[i]; i++; }
      }
      tokens.push({ type: TokenType.NUMBER, value: num });
      continue;
    }
    if ("^_{}()#&~'/,.-+*=|[]\\<>\"".includes(ch)) {
      if (ch === "\\" && i + 1 < input.length && input[i + 1] === "\\") {
        tokens.push({ type: TokenType.SYMBOL, value: "\\\\" });
        i += 2;
        continue;
      }
      if (ch === "\\") {
        i++;
        let cmd = "";
        while (i < input.length && /[A-Za-z]/.test(input[i])) { cmd += input[i]; i++; }
        const lower = cmd.toLowerCase();
        if (cmd.length > 0 && LATEX_KEYWORDS.has(lower)) tokens.push({ type: TokenType.KEYWORD, value: lower });
        else if (cmd.length > 0) tokens.push({ type: TokenType.IDENT, value: cmd });
        else tokens.push({ type: TokenType.SYMBOL, value: "\\" });
      } else {
        tokens.push({ type: TokenType.SYMBOL, value: ch });
        i++;
      }
      continue;
    }
    if (isAlpha(ch)) {
      let ident = ch;
      i++;
      while (i < input.length && isAlpha(input[i])) { ident += input[i]; i++; }
      tokens.push({ type: TokenType.IDENT, value: ident });
      continue;
    }
    tokens.push({ type: TokenType.UNKNOWN, value: ch });
    i++;
  }
  tokens.push({ type: TokenType.EOF, value: "" });
  return tokens;
}

function parseTokenSlice(ParserClass, tokens) {
  const filtered = tokens.filter(t => t.type !== TokenType.EOF);
  if (filtered.length === 0) return { type: "Literal", value: "" };
  return new ParserClass([...filtered, { type: TokenType.EOF, value: "" }]).parseExpression();
}

function normalizeLatexOperator(value) {
  return LATEX_LITERAL_TO_HWP[value] || null;
}

function normalizeHwpOperator(value) {
  if (RELATION_OPERATORS.has(value)) return value;
  return HWP_LITERAL_TO_LATEX[value] ? (LATEX_LITERAL_TO_HWP[value] || value) : value;
}

function operatorToLatex(operator) {
  return BINARY_OP_TO_LATEX[operator] || operator;
}

function literalToLatex(value) {
  return HWP_LITERAL_TO_LATEX[value] || value;
}

function literalToHwp(value) {
  return LATEX_LITERAL_TO_HWP[value] || value;

function isFunctionLikeValue(value) {
  return BASIC_FUNCTIONS.has(value) || ["LIM", "lim", "Lim", "PROD", "prod"].includes(value);

function isFunctionLikeNode(node) {
  if (!node) return false;
  if (node.type === "FunctionName") return true;
  if (node.type === "Literal") return isFunctionLikeValue(node.value);
  if (node.type === "Subscript" || node.type === "Superscript") return isFunctionLikeNode(node.base);

}

function functionNameToLatex(name) {

function formatImplicitJoin(node, left, right) {
  if (isFunctionLikeNode(node.left)) {

  return `${left}${right}`;

function wrapStyledChildForHwp(node) {
  if (!node) return "";
  const rendered = toHwpEqn(node);
  if (["Literal", "FunctionName", "Text", "Bracket", "Styled", "Subscript", "Superscript"].includes(node.type)) return rendered;

function makeNameNode(value) {

function isHwpMatrixEnvName(envName) {

function hwpColumnKeywordToAlign(keyword) {

function alignToHwpColumnKeyword(align) {

function sanitizeArrayAlignSpec(alignSpec) {
  const cleaned = (alignSpec || "").replace(/[^lcr]/g, "");

function transposeHwpMatrixColumns(columns) {
  const rowCount = columns.reduce((max, column) => Math.max(max, column.entries.length), 0);
  const rows = [];
  for (let rowIndex = 0; rowIndex < rowCount; rowIndex++) {
    rows.push(columns.map(column => column.entries[rowIndex] || { type: "Literal", value: "" }));

  return {

function splitHwpColumnEntries(tokens) {
  const entries = [];
  let current = [];
  let depth = 0;

  const pushEntry = () => {
    entries.push(parseTokenSlice(HwpParser, current));
    current = [];

  for (const tk of tokens) {
    if (tk.type === TokenType.EOF) break;
    if (tk.type === TokenType.SYMBOL && isOpenDelimiter(tk.value)) {
      depth++;
      current.push(tk);
      continue;
    }
    if (tk.type === TokenType.SYMBOL && isCloseDelimiter(tk.value)) {
      depth = Math.max(0, depth - 1);
      current.push(tk);
      continue;
    }
    if (depth === 0 && tk.type === TokenType.SYMBOL && (tk.value === "#" || tk.value === "\\\\")) {
      pushEntry();
      continue;
    }
    current.push(tk);
  }

  if (current.length > 0 || entries.length === 0) pushEntry();
  return entries;
}

function matrixDelimitersToLatex(envName) {
  if (envName === "pmatrix") return { left: "\\left(", right: "\\right)" };
  if (envName === "bmatrix") return { left: "\\left[", right: "\\right]" };
  if (envName === "dmatrix") return { left: "\\left|", right: "\\right|" };
  return { left: "", right: "" };

function bracketDelimitersToHwpMatrixEnv(leftDelim, rightDelim) {
  if ((leftDelim === "\\left(" || leftDelim === "(") && (rightDelim === "\\right)" || rightDelim === ")")) return "pmatrix";
  if ((leftDelim === "\\left[" || leftDelim === "[") && (rightDelim === "\\right]" || rightDelim === "]")) return "bmatrix";
  if ((leftDelim === "\\left|" || leftDelim === "|") && (rightDelim === "\\right|" || rightDelim === "|")) return "dmatrix";
  return "matrix";

  return rows.map(row => row.map(cell => toLatex(cell)).join(" & ")).join(" \\\\ ");

function formatHwpMatrixColumnMode(envName, rows, alignSpec) {
  const columnCount = Math.max(
    alignSpec ? alignSpec.length : 0,
    rows.reduce((max, row) => Math.max(max, row.length), 0)
  );
  const normalizedAlign = (alignSpec || "").padEnd(columnCount, "c");
  const columns = [];

  for (let columnIndex = 0; columnIndex < columnCount; columnIndex++) {
    const keyword = alignToHwpColumnKeyword(normalizedAlign[columnIndex] || "c");
    const entries = [];
    for (let rowIndex = 0; rowIndex < rows.length; rowIndex++) {
      entries.push(toHwpEqn(rows[rowIndex][columnIndex] || { type: "Literal", value: "" }));
    }
    columns.push(`${keyword}{${entries.join(" # ")}}`);
  }

  return `${envName}{${columns.join(" ")}}`;
}

function splitHwpRows(tokens) {
  const rows = [];
  let row = [];
  let cell = [];
  let depth = 1;

  const pushCell = () => {
    row.push(parseTokenSlice(HwpParser, cell));
    cell = [];
  };

  const pushRow = () => {
    pushCell();
    rows.push(row);
    row = [];
  };

  while (tokens.length > 0) {
    const tk = tokens.shift();
    if (tk.type === TokenType.EOF) break;
    if (tk.type === TokenType.SYMBOL && isOpenDelimiter(tk.value)) {
      depth++;
      cell.push(tk);
      continue;
    }
    if (tk.type === TokenType.SYMBOL && isCloseDelimiter(tk.value)) {
      depth--;
      if (tk.value === "}" && depth === 0) {
        if (cell.length > 0 || row.length > 0) pushRow();
        break;
      }
      cell.push(tk);
      continue;
    }
    if (depth === 1 && tk.type === TokenType.SYMBOL && tk.value === "#") {
      pushRow();
      continue;
    }
    if (depth === 1 && tk.type === TokenType.SYMBOL && tk.value === "&") {
      pushCell();
      continue;
    }
    if (depth === 1 && tk.type === TokenType.SYMBOL && tk.value === "\\\\") {
      pushRow();
      continue;
    }
    cell.push(tk);
  }

  return rows.length > 0 ? rows : [[{ type: "Literal", value: "" }]];
}

function splitLatexRows(tokens, envName) {
  const rows = [];
  let row = [];
  let cell = [];
  let depth = 0;
  let consumed = 0;

  const pushCell = () => {
    row.push(parseTokenSlice(LatexParser, cell));
    cell = [];
  };

  const pushRow = () => {
    pushCell();
    rows.push(row);
    row = [];
  };

  const isEndEnvAt = (idx) => {
    const t0 = tokens[idx];
    const t1 = tokens[idx + 1];
    const t2 = tokens[idx + 2];
    if (!t0 || !t1 || !t2) return false;
    return t0.type === TokenType.KEYWORD && t0.value === "end"
      && t1.type === TokenType.SYMBOL && t1.value === "{"
      && (t2.type === TokenType.IDENT || t2.type === TokenType.KEYWORD)
      && t2.value.toLowerCase() === envName;
  };

  let i = 0;
  while (i < tokens.length) {
    const tk = tokens[i];
    if (tk.type === TokenType.EOF) break;
    if (depth === 0 && isEndEnvAt(i)) {
      if (cell.length > 0 || row.length > 0) pushRow();
      consumed = i;
      break;
    }
    if (tk.type === TokenType.SYMBOL && isOpenDelimiter(tk.value)) {
      depth++;
      cell.push(tk);
      i++;
      continue;
    }
    if (tk.type === TokenType.SYMBOL && isCloseDelimiter(tk.value)) {
      depth = Math.max(0, depth - 1);
      cell.push(tk);
      i++;
      continue;
    }
    if (depth === 0 && tk.type === TokenType.SYMBOL && tk.value === "&") {
      pushCell();
      i++;
      continue;
    }
    if (depth === 0 && tk.type === TokenType.SYMBOL && tk.value === "\\\\") {
      pushRow();
      i++;
      continue;
    }
    cell.push(tk);
    i++;
  }

  if (consumed === 0 && i >= tokens.length) consumed = i;
  return {
    rows: rows.length > 0 ? rows : [[{ type: "Literal", value: "" }]],
    consumed
  };

class HwpParser {
  constructor(tokens) {
    this.tokens = tokens.filter(t => t.type !== TokenType.SPACE && t.type !== TokenType.UNKNOWN);
    this.pos = 0;
  }
  peek() { return this.tokens[this.pos] || { type: TokenType.EOF, value: "" }; }
  next() { const t = this.peek(); if (t.type !== TokenType.EOF) this.pos++; return t; }
  matchSymbol(v) { const t = this.peek(); return t.type === TokenType.SYMBOL && t.value === v; }
  matchKeyword(v) { const t = this.peek(); return t.type === TokenType.KEYWORD && t.value === v; }

  parseExpression() { return this.parseRelation(); }

  canStartFactor() {
    const t = this.peek();
    if (t.type === TokenType.NUMBER || t.type === TokenType.IDENT) return true;
    if (t.type === TokenType.KEYWORD) {
      const kw = t.value;
      return !["TIMES", "OVER", "ATOP", "CHOOSE", "REL", "BUILDREL", "RIGHT"].includes(kw);
    }
    if (t.type === TokenType.SYMBOL && (isOpenDelimiter(t.value) || t.value === "\"")) return true;
    return false;
  }

  tryParseCompoundSymbolOperator() {
    const t1 = this.peek();
    const t2 = this.tokens[this.pos + 1];
    const t3 = this.tokens[this.pos + 2];
    if (t1.type !== TokenType.SYMBOL) return null;
    const v1 = t1.value;
    const v2 = t2 && t2.type === TokenType.SYMBOL ? t2.value : "";
    const v3 = t3 && t3.type === TokenType.SYMBOL ? t3.value : "";
    if (v1 === "<" && v2 === "-" && v3 === ">") { this.pos += 3; return "<->"; }
    if (v1 === "-" && v2 === ">") { this.pos += 2; return "->"; }
    if (v1 === "<" && v2 === "-") { this.pos += 2; return "<-"; }
    if (v1 === "<" && v2 === "=") { this.pos += 2; return "<="; }
    if (v1 === ">" && v2 === "=") { this.pos += 2; return ">="; }
    if (v1 === "<" && v2 === ">") { this.pos += 2; return "<>"; }
    if (v1 === "=" && v2 === ">") { this.pos += 2; return "=>"; }
    if (["=", "<", ">"].includes(v1)) { this.pos += 1; return v1; }
    return null;
  }

  tryParseInfixRelationOperator() {
    const start = this.pos;
    const op = this.tryParseCompoundSymbolOperator();
    if (op) return op;
    this.pos = start;
    const t = this.peek();
    if (t.type === TokenType.IDENT || t.type === TokenType.KEYWORD) {
      const normalized = normalizeHwpOperator(t.value);
      if (RELATION_OPERATORS.has(normalized)) {
        this.next();
        return normalized;
      }
    }
    return null;
  }

  parseRelation() {
    let node = this.parseAdditive();
    while (true) {
      if (this.matchKeyword("REL") || this.matchKeyword("BUILDREL")) {
        node = this.parseAnnotatedRelation(node);
        continue;
      }
      const op = this.tryParseInfixRelationOperator();
      if (!op) break;
      const right = this.parseAdditive();
      node = { type: "BinaryOp", operator: op, left: node, right };
    }
    return node;
  }

  parseAnnotatedRelation(left) {
    const buildOnly = this.next().value === "BUILDREL";
    const arrow = this.parseRelationSymbol();
    const above = this.parseAnnotationArgument();
    const below = buildOnly ? null : this.parseAnnotationArgument();
    const right = this.parseAdditive();
    return { type: "Relation", left, arrow, above, below, right };
  }

  parseRelationSymbol() {
    const op = this.tryParseCompoundSymbolOperator();
    if (op) return op;
    const t = this.peek();
    if (t.type === TokenType.IDENT || t.type === TokenType.KEYWORD || t.type === TokenType.SYMBOL) {
      this.next();
      return normalizeHwpOperator(t.value);
    }
    return "";
  }

  parseAnnotationArgument() {
    if (this.matchSymbol("{")) {
      this.next();
      const expr = this.parseExpression();
      if (this.matchSymbol("}")) this.next();
      return expr;
    }
    return this.parseFactor();
  }

  parseAdditive() {
    let node = this.parseTerm();
    while (true) {
      const t = this.peek();
      if (t.type === TokenType.SYMBOL && (t.value === "+" || t.value === "-")) {
        const next = this.tokens[this.pos + 1];
        if (t.value === "-" && next && next.type === TokenType.SYMBOL && next.value === ">") break;
        this.next();
        const right = this.parseTerm();
        node = { type: "BinaryOp", operator: t.value, left: node, right };
      } else {
        break;
      }
    }
    return node;
  }

  parseTerm() {
    let node = this.parseFactor();
    while (true) {
      const t = this.peek();
      if (t.type === TokenType.KEYWORD) {
        const kw = t.value;
        if (kw === "TIMES") {
          this.next();
          node = { type: "BinaryOp", operator: "times", left: node, right: this.parseFactor() };
          continue;
        }
        if (kw === "OVER" || kw === "ATOP") {
          this.next();
          node = { type: "Fraction", numerator: node, denominator: this.parseFactor(), withBar: kw === "OVER" };
          continue;
        }
        if (kw === "CHOOSE") {
          this.next();
          node = { type: "Choose", total: node, choose: this.parseFactor() };
          continue;
        }
      }
      if (t.type === TokenType.SYMBOL && t.value === "/") {
        this.next();
        node = { type: "BinaryOp", operator: "/", left: node, right: this.parseFactor() };
        continue;
      }
      if (this.canStartFactor()) {
        node = { type: "BinaryOp", operator: "", left: node, right: this.parseFactor() };
        continue;
      }
      break;
    }
    return node;
  }

  parseFactor() {
    const fc = this.tryParseFunctionCall();
    if (fc) return fc;
    const t = this.peek();
    if (t.type === TokenType.SYMBOL && t.value === "+") {
      this.next();
      return { type: "UnaryOp", operator: "+", child: this.parseFactor() };
    }
    if (t.type === TokenType.SYMBOL && t.value === "-") {
      this.next();
      return { type: "UnaryOp", operator: "-", child: this.parseFactor() };
    }
    if (t.type === TokenType.NUMBER) { this.next(); return this.maybeParseSubSup({ type: "Literal", value: t.value }); }
    if (t.type === TokenType.IDENT) {
      this.next();
      return this.maybeParseSubSup(makeNameNode(t.value));
    }
    if (t.type === TokenType.KEYWORD) {
      this.next();
      const kw = t.value;
      if (kw === "SQRT") {
        let rad = this.parseFactor();
        if (rad.type === "Bracket") rad = this.removeBracket(rad);
        return { type: "Root", radicand: rad };
      }
      if (kw === "INT" || kw === "OINT") {
        const node = { type: "Integral", variant: kw === "INT" ? "int" : "oint" };
        if (this.matchSymbol("_")) { this.next(); node.lower = this.parseSubOrSupContent(); }
        if (this.matchSymbol("^")) { this.next(); node.upper = this.parseSubOrSupContent(); }
        if (this.canStartFactor()) {
          node.body = this.parseFactor();
          if (node.body.type === "Bracket") node.body = this.removeBracket(node.body);
        }
        return node;
      }
      if (kw === "SUM") {
        const node = { type: "Summation" };
        if (this.matchSymbol("_")) { this.next(); node.lower = this.parseSubOrSupContent(); }
        if (this.matchSymbol("^")) { this.next(); node.upper = this.parseSubOrSupContent(); }
        if (this.canStartFactor()) {
          node.body = this.parseFactor();
          if (node.body && node.body.type === "Bracket") node.body = this.removeBracket(node.body);
        }
        return node;
      }
      if (kw === "BINOM") return this.parseChoosePrefix();
      if (kw === "BIGG") return { type: "SizedLiteral", size: "bigg", child: this.parseSizedTarget() };
      if (kw === "NOT") return { type: "Negation", child: this.parseFactor() };
      if (["RM","IT","BOLD","RMBOLD"].includes(kw)) return this.parseStyledPrefix(kw.toLowerCase());
      if (["ACUTE","GRAVE","DOT","DDOT","BAR","VEC","DYAD","UNDER","HAT","ARCH","CHECK","TILDE"].includes(kw)) {
        let child = this.parseFactor();
        if (child.type === "Bracket") child = this.removeBracket(child);
        return { type: "Decorated", decoType: kw.toLowerCase(), child };
      }
      if (kw === "LEFT") return this.parseLeftBracket();
      if (["MATRIX","PMATRIX","BMATRIX","DMATRIX","CASES","PILE","LPILE","RPILE","EQALIGN"].includes(kw)) {
        return this.parseEnv(kw.toLowerCase());
      }
      return this.maybeParseSubSup({ type: "Literal", value: kw });
    }
    if (t.type === TokenType.SYMBOL) {
      if (t.value === "\"") return this.parseQuotedText();
      if (isOpenDelimiter(t.value)) return this.parseBracketDirect();
      if (isCloseDelimiter(t.value)) { this.next(); return { type: "Literal", value: t.value }; }
      this.next();
      return { type: "Literal", value: t.value };
    }
    this.next();
    return { type: "Literal", value: "" };
  }

  parseChoosePrefix() {
    const total = this.parseAnnotationArgument();
    const choose = this.parseAnnotationArgument();
    return { type: "Choose", total, choose };
  }

  parseStyledPrefix(style) {
    let child = this.parseStyleArgument();
    if (child && child.type === "Bracket" && child.leftDelim === "{") child = this.removeBracket(child);
    return this.maybeParseSubSup({ type: "Styled", style, child });
  }

  parseStyleArgument() {
    if (this.matchSymbol("{")) return this.parseSubOrSupContent();
    const t = this.peek();
    if (t.type === TokenType.NUMBER) {
      this.next();
      return { type: "Literal", value: t.value };
    }
    if (t.type === TokenType.IDENT) {
      this.next();
      return makeNameNode(t.value);
    }
    if (t.type === TokenType.KEYWORD) {
      this.next();
      return makeNameNode(t.value);
    }
    if (t.type === TokenType.SYMBOL && t.value === "\"") return this.parseQuotedText();
    if (t.type === TokenType.SYMBOL && isOpenDelimiter(t.value)) return this.parseBracketDirect();
    if (t.type !== TokenType.EOF) {
      this.next();
      return { type: "Literal", value: t.value };
    }
    return { type: "Literal", value: "" };
  }

  parseSizedTarget() {
    const t = this.peek();
    if (t.type === TokenType.SYMBOL || t.type === TokenType.IDENT || t.type === TokenType.KEYWORD || t.type === TokenType.NUMBER) {
      this.next();
      return { type: "Literal", value: t.value };
    }
    return { type: "Literal", value: "" };
  }

  parseQuotedText() {
    this.next();
    let value = "";
    while (!this.matchSymbol("\"") && this.peek().type !== TokenType.EOF) {
      value += this.next().value;
    }
    if (this.matchSymbol("\"")) this.next();
    return this.maybeParseSubSup({ type: "Text", value });
  }

  tryParseFunctionCall() {
    const t1 = this.peek();
    const t2 = this.tokens[this.pos + 1];
    if (t1.type !== TokenType.IDENT) return undefined;
    if (t2 && t2.type === TokenType.KEYWORD && t2.value === "LEFT") {
      this.next();
      return this.maybeParseSubSup({ type: "BinaryOp", operator: "apply", left: makeNameNode(t1.value), right: this.parseLeftBracket() });
    }
    if (t2 && t2.type === TokenType.SYMBOL && isOpenDelimiter(t2.value)) {
      this.next();
      return this.maybeParseSubSup({ type: "BinaryOp", operator: "apply", left: makeNameNode(t1.value), right: this.parseBracketDirect() });
    }
    return undefined;
  }

  parseLeftBracket() {
    let leftDelim = "";
    const s = this.peek();
    if (s.type === TokenType.SYMBOL && isOpenDelimiter(s.value)) {
      leftDelim = "LEFT" + s.value;
      this.next();
    }
    const content = this.parseExpression();
    let rightDelim = "";
    if (this.matchKeyword("RIGHT")) {
      this.next();
      const s2 = this.peek();
      if (s2.type === TokenType.SYMBOL && isCloseDelimiter(s2.value)) {
        rightDelim = "RIGHT" + s2.value;
        this.next();
      }
    }
    if (leftDelim === "" && rightDelim === "") return content;
    return this.maybeParseSubSup(this.flattenBracket({ type: "Bracket", leftDelim, rightDelim, content }));
  }

  parseBracketDirect() {
    const open = this.next().value;
    const content = this.parseExpression();
    let right = "";
    if (matchingDelimiter(open) === this.peek().value) {
      right = this.next().value;
    }
    return this.maybeParseSubSup(this.flattenBracket({ type: "Bracket", leftDelim: open, rightDelim: right, content }));
  }

  flattenBracket(br) {
    if (br.content.type === "Bracket") {
      const inner = br.content;
      if (br.leftDelim === inner.leftDelim && br.rightDelim === inner.rightDelim && (br.leftDelim === "{" || br.leftDelim === "")) return inner;
    }
    return br;
  }

  removeBracket(br) {
    if (br.leftDelim === "{" || br.leftDelim === "") return br.content;
    return br;
  }

  parseEnv(envName) {
    if (isHwpMatrixEnvName(envName)) {
      if (this.peek().type === TokenType.KEYWORD && ["COL","LCOL","RCOL"].includes(this.peek().value)) {
        return this.parseMatrixColumnEnv(envName, false);
      }
      if (this.matchSymbol("{")) {
        const nextToken = this.tokens[this.pos + 1];
        if (nextToken && nextToken.type === TokenType.KEYWORD && ["COL","LCOL","RCOL"].includes(nextToken.value)) {
          return this.parseMatrixColumnEnv(envName, true);
        }
      }
    }

    let alignSpec = null;
    if (this.peek().type === TokenType.KEYWORD && ["COL","LCOL","RCOL"].includes(this.peek().value)) {
      const kw = this.next().value;
      alignSpec = hwpColumnKeywordToAlign(kw);
    }
    if (!this.matchSymbol("{")) return { type: "Literal", value: envName };
    this.next();
    const rows = splitHwpRows(this.tokens.slice(this.pos));
    let depth = 1;
    while (this.peek().type !== TokenType.EOF && depth > 0) {
      const tk = this.next();
      if (tk.type === TokenType.SYMBOL && isOpenDelimiter(tk.value)) depth++;
      else if (tk.type === TokenType.SYMBOL && isCloseDelimiter(tk.value)) depth--;
    }
    return this.maybeParseSubSup({ type: "BeginEnv", envName, rows, alignSpec });
  }

  parseMatrixColumnEnv(envName, wrapped) {
    if (wrapped && this.matchSymbol("{")) this.next();
    const columns = [];
    while (this.peek().type === TokenType.KEYWORD && ["COL","LCOL","RCOL"].includes(this.peek().value)) {
      columns.push(this.parseMatrixColumnGroup());
    }
    if (wrapped && this.matchSymbol("}")) this.next();
    const { rows, columnAlignSpec } = transposeHwpMatrixColumns(columns);
    return this.maybeParseSubSup({ type: "BeginEnv", envName, rows, columnAlignSpec, columnMode: true });
  }

  parseMatrixColumnGroup() {
    const alignKeyword = this.next().value;
    if (!this.matchSymbol("{")) {
      return { align: hwpColumnKeywordToAlign(alignKeyword), entries: [{ type: "Literal", value: "" }] };
    }
    this.next();
    const tokens = [];
    let depth = 1;
    while (this.peek().type !== TokenType.EOF && depth > 0) {
      const tk = this.next();
      if (tk.type === TokenType.SYMBOL && isOpenDelimiter(tk.value)) {
        depth++;
        tokens.push(tk);
        continue;
      }
      if (tk.type === TokenType.SYMBOL && isCloseDelimiter(tk.value)) {
        depth--;
        if (depth === 0) break;
        tokens.push(tk);
        continue;
      }
      tokens.push(tk);
    }
    return {
      align: hwpColumnKeywordToAlign(alignKeyword),
      entries: splitHwpColumnEntries(tokens)
    };
  }

  maybeParseSubSup(base) {
    let node = base;
    while (true) {
      if (this.matchSymbol("^")) {
        this.next();
        node = { type: "Superscript", base: node, exponent: this.parseSubOrSupContent() };
        continue;
      }
      if (this.matchSymbol("_")) {
        this.next();
        node = { type: "Subscript", base: node, sub: this.parseSubOrSupContent() };
        continue;
      }
      break;
    }
    return node;
  }

  parseSubOrSupContent() {
    if (this.matchSymbol("{")) {
      this.next();
      const expr = this.parseExpression();
      if (this.matchSymbol("}")) this.next();
      return expr;
    }
    return this.parseSingleFactorNoSubSup();
  }

  parseSingleFactorNoSubSup() {
    const t = this.peek();
    if (t.type !== TokenType.EOF) {
      this.next();
      return { type: "Literal", value: t.value };
    }
    return { type: "Literal", value: "" };
  }
}

class LatexParser {
  constructor(tokens) {
    this.tokens = tokens.filter(t => t.type !== TokenType.SPACE && t.type !== TokenType.UNKNOWN);
    this.pos = 0;
  }
  peek() { return this.tokens[this.pos] || { type: TokenType.EOF, value: "" }; }
  next() { const t = this.peek(); if (t.type !== TokenType.EOF) this.pos++; return t; }
  matchSymbol(v) { const t = this.peek(); return t.type === TokenType.SYMBOL && t.value === v; }
  matchKeyword(v) { const t = this.peek(); return t.type === TokenType.KEYWORD && t.value === v; }

  parseExpression() { return this.parseRelation(); }

  canStartFactor() {
    const t = this.peek();
    if (t.type === TokenType.NUMBER || t.type === TokenType.IDENT) return true;
    if (t.type === TokenType.KEYWORD) {
      const kw = t.value;
      return !["times","right","end","over","atop","choose","overset","underset"].includes(kw);
    }
    if (t.type === TokenType.SYMBOL && isOpenDelimiter(t.value)) return true;
    return false;
  }

  tryParseCompoundSymbolOperator() {
    const t1 = this.peek();
    const t2 = this.tokens[this.pos + 1];
    const t3 = this.tokens[this.pos + 2];
    if (t1.type !== TokenType.SYMBOL) return null;
    const v1 = t1.value;
    const v2 = t2 && t2.type === TokenType.SYMBOL ? t2.value : "";
    const v3 = t3 && t3.type === TokenType.SYMBOL ? t3.value : "";
    if (v1 === "<" && v2 === "-" && v3 === ">") { this.pos += 3; return "<->"; }
    if (v1 === "-" && v2 === ">") { this.pos += 2; return "->"; }
    if (v1 === "<" && v2 === "-") { this.pos += 2; return "<-"; }
    if (v1 === "<" && v2 === "=") { this.pos += 2; return "<="; }
    if (v1 === ">" && v2 === "=") { this.pos += 2; return ">="; }
    if (v1 === "<" && v2 === ">") { this.pos += 2; return "<>"; }
    if (v1 === "=" && v2 === ">") { this.pos += 2; return "=>"; }
    if (["=", "<", ">"].includes(v1)) { this.pos += 1; return v1; }
    return null;
  }

  tryParseInfixRelationOperator() {
    const start = this.pos;
    const op = this.tryParseCompoundSymbolOperator();
    if (op) return op;
    this.pos = start;
    const t = this.peek();
    if (t.type === TokenType.IDENT || t.type === TokenType.KEYWORD) {
      const normalized = normalizeLatexOperator(t.value);
      if (RELATION_OPERATORS.has(normalized)) {
        this.next();
        return normalized;
      }
    }
    return null;
  }

  tryParseAnnotatedRelationOperator() {
    if (!this.matchKeyword("overset") && !this.matchKeyword("underset")) return null;
    const start = this.pos;
    const op = this.parseAnnotatedOperator();
    if (op && RELATION_OPERATORS.has(op.arrow)) return op;
    this.pos = start;
    return null;
  }

  parseAnnotatedOperator() {
    if (this.matchKeyword("overset") || this.matchKeyword("underset")) {
      const kind = this.next().value;
      const annotation = this.parseGroupExpression();
      let base = null;
      if (this.matchSymbol("{")) {
        this.next();
        base = this.parseAnnotatedOperator() || this.parseRelationOperatorAtom();
        if (this.matchSymbol("}")) this.next();
      } else {
        base = this.parseAnnotatedOperator() || this.parseRelationOperatorAtom();
      }
      if (!base) return null;
      return {
        arrow: base.arrow,
        above: kind === "overset" ? annotation : base.above,
        below: kind === "underset" ? annotation : base.below
      };
    }
    return this.parseRelationOperatorAtom();
  }

  parseRelationOperatorAtom() {
    const start = this.pos;
    const op = this.tryParseCompoundSymbolOperator();
    if (op) return { arrow: op, above: null, below: null };
    this.pos = start;
    const t = this.peek();
    if (t.type === TokenType.IDENT || t.type === TokenType.KEYWORD) {
      const normalized = normalizeLatexOperator(t.value);
      if (RELATION_OPERATORS.has(normalized)) {
        this.next();
        return { arrow: normalized, above: null, below: null };
      }
    }
    return null;
  }

  parseRelation() {
    let node = this.parseAdditive();
    while (true) {
      const annotated = this.tryParseAnnotatedRelationOperator();
      if (annotated) {
        node = {
          type: "Relation",
          left: node,
          arrow: annotated.arrow,
          above: annotated.above,
          below: annotated.below,
          right: this.parseAdditive()
        };
        continue;
      }
      const op = this.tryParseInfixRelationOperator();
      if (!op) break;
      const right = this.parseAdditive();
      node = { type: "BinaryOp", operator: op, left: node, right };
    }
    return node;
  }

  parseAdditive() {
    let node = this.parseTerm();
    while (true) {
      const t = this.peek();
      if (t.type === TokenType.SYMBOL && (t.value === "+" || t.value === "-")) {
        const next = this.tokens[this.pos + 1];
        if (t.value === "-" && next && next.type === TokenType.SYMBOL && next.value === ">") break;
        this.next();
        node = { type: "BinaryOp", operator: t.value, left: node, right: this.parseTerm() };
      } else {
        break;
      }
    }
    return node;
  }

  parseTerm() {
    let node = this.parseFactor();
    while (true) {
      const t = this.peek();
      if (t.type === TokenType.KEYWORD) {
        if (t.value === "times") {
          this.next();
          node = { type: "BinaryOp", operator: "times", left: node, right: this.parseFactor() };
          continue;
        }
        if (t.value === "over" || t.value === "atop") {
          this.next();
          node = { type: "Fraction", numerator: node, denominator: this.parseFactor(), withBar: t.value === "over" };
          continue;
        }
        if (t.value === "choose") {
          this.next();
          node = { type: "Choose", total: node, choose: this.parseFactor() };
          continue;
        }
      }
      if (t.type === TokenType.SYMBOL && t.value === "/") {
        this.next();
        node = { type: "BinaryOp", operator: "/", left: node, right: this.parseFactor() };
        continue;
      }
      if (this.canStartFactor()) {
        node = { type: "BinaryOp", operator: "", left: node, right: this.parseFactor() };
        continue;
      }
      break;
    }
    return node;
  }

  parseFactor() {
    const fc = this.tryParseFunctionCall();
    if (fc) return fc;
    const t = this.peek();
    if (t.type === TokenType.SYMBOL && t.value === "+") {
      this.next();
      return { type: "UnaryOp", operator: "+", child: this.parseFactor() };
    }
    if (t.type === TokenType.SYMBOL && t.value === "-") {
      this.next();
      return { type: "UnaryOp", operator: "-", child: this.parseFactor() };
    }
    if (t.type === TokenType.NUMBER) { this.next(); return this.maybeParseSubSup({ type: "Literal", value: t.value }); }
    if (t.type === TokenType.IDENT) {
      this.next();
      return this.maybeParseSubSup(makeNameNode(t.value));
    }
    if (t.type === TokenType.KEYWORD) {
      this.next();
      const kw = t.value;
      if (kw === "left") return this.parseLeftRightBracket();
      if (kw === "begin") return this.parseBeginEnv();
      if (kw === "sqrt") {
        let rad = this.parseFactor();
        if (rad.type === "Bracket") rad = this.removeBracket(rad);
        return { type: "Root", radicand: rad };
      }
      if (kw === "frac") {
        return { type: "Fraction", numerator: this.parseGroupExpression(), denominator: this.parseGroupExpression(), withBar: true };
      }
      if (kw === "int" || kw === "oint") {
        const node = { type: "Integral", variant: kw === "int" ? "int" : "oint" };
        if (this.matchSymbol("_")) { this.next(); node.lower = this.parseSubOrSupContent(); }
        if (this.matchSymbol("^")) { this.next(); node.upper = this.parseSubOrSupContent(); }
        if (this.canStartFactor()) {
          node.body = this.parseFactor();
          if (node.body.type === "Bracket") node.body = this.removeBracket(node.body);
        }
        return node;
      }
      if (kw === "sum") {
        const node = { type: "Summation" };
        if (this.matchSymbol("_")) { this.next(); node.lower = this.parseSubOrSupContent(); }
        if (this.matchSymbol("^")) { this.next(); node.upper = this.parseSubOrSupContent(); }
        if (this.canStartFactor()) {
          node.body = this.parseFactor();
          if (node.body && node.body.type === "Bracket") node.body = this.removeBracket(node.body);
        }
        return node;
      }
      if (kw === "binom") return this.parseChoosePrefix();
      if (kw === "not") return { type: "Negation", child: this.parseFactor() };
      if (["bigg","biggl","biggr","biggm"].includes(kw)) return { type: "SizedLiteral", size: "bigg", child: this.parseSizedTarget() };
      if (["mathrm","mathit","mathbf","boldsymbol"].includes(kw)) return this.parseStyledCommand(kw);
      if (kw === "operatorname") return this.parseOperatorName();
      if (["acute","grave","dot","ddot","bar","vec","hat","tilde","check","widehat","widetilde","overparen","underline","overline","overrightarrow","overleftrightarrow"].includes(kw)) {
        let child = this.parseFactor();
        if (child.type === "Bracket") child = this.removeBracket(child);
        return { type: "Decorated", decoType: LATEX_DECORATION_TO_HWP[kw] || kw, child };
      }
      if (kw === "text" || kw === "mathrm") return this.parseTextCommand();
      return this.maybeParseSubSup({ type: "Literal", value: kw });
    }
    if (t.type === TokenType.SYMBOL) {
      if (isOpenDelimiter(t.value)) {
        const open = this.next().value;
        const content = this.parseExpression();
        let right = "";
        if (matchingDelimiter(open) === this.peek().value) right = this.next().value;
        return this.maybeParseSubSup(this.flattenBracket({ type: "Bracket", leftDelim: open, rightDelim: right, content }));
      }
      if (isCloseDelimiter(t.value)) { this.next(); return { type: "Literal", value: t.value }; }
      if (t.value === "\\\\") { this.next(); return { type: "Literal", value: "\\\\" }; }
      this.next();
      return { type: "Literal", value: t.value };
    }
    this.next();
    return { type: "Literal", value: "" };
  }

  parseChoosePrefix() {
    return { type: "Choose", total: this.parseGroupExpression(), choose: this.parseGroupExpression() };
  }

  parseStyledCommand(command) {
    let child = this.matchSymbol("{") ? this.parseGroupExpression() : this.parseFactor();
    if (child && child.type === "Bracket" && child.leftDelim === "{") child = this.removeBracket(child);
    return this.maybeParseSubSup({ type: "Styled", style: LATEX_STYLE_TO_HWP[command] || command, child });
  }

  parseOperatorName() {
    const child = this.parseGroupExpression();
    if (child.type === "Literal" || child.type === "Text" || child.type === "FunctionName") {
      return this.maybeParseSubSup({ type: "FunctionName", value: child.value });
    }
    return this.maybeParseSubSup({ type: "FunctionName", value: toHwpEqn(child).replace(/^"|"$/g, "") });
  }

  parseSizedTarget() {
    const t = this.peek();
    if (t.type === TokenType.SYMBOL || t.type === TokenType.IDENT || t.type === TokenType.KEYWORD || t.type === TokenType.NUMBER) {
      this.next();
      return { type: "Literal", value: t.value };
    }
    return { type: "Literal", value: "" };
  }

  parseTextCommand() {
    const valueNode = this.parseGroupExpression();
    return { type: "Text", value: valueNode.type === "Literal" ? valueNode.value : toLatex(valueNode).replace(/^\\text\{|\}$/g, "") };
  }

  tryParseFunctionCall() {
    const t1 = this.peek();
    const t2 = this.tokens[this.pos + 1];
    if (t1.type !== TokenType.IDENT) return undefined;
    if (t2 && t2.type === TokenType.KEYWORD && t2.value === "left") {
      this.next();
      return this.maybeParseSubSup({ type: "BinaryOp", operator: "apply", left: makeNameNode(t1.value), right: this.parseLeftRightBracket() });
    }
    if (t2 && t2.type === TokenType.SYMBOL && isOpenDelimiter(t2.value)) {
      this.next();
      return this.maybeParseSubSup({ type: "BinaryOp", operator: "apply", left: makeNameNode(t1.value), right: this.parseFactor() });
    }
    return undefined;
  }

  parseLeftRightBracket() {
    let leftDelim = "";
    const s = this.peek();
    if (s.type === TokenType.SYMBOL && isOpenDelimiter(s.value)) {
      leftDelim = "\\left" + s.value;
      this.next();
    }
    const content = this.parseExpression();
    let rightDelim = "";
    if (this.matchKeyword("right")) {
      this.next();
      const s2 = this.peek();
      if (s2.type === TokenType.SYMBOL && isCloseDelimiter(s2.value)) {
        rightDelim = "\\right" + s2.value;
        this.next();
      }
    }
    if (leftDelim === "" && rightDelim === "") return content;
    return this.maybeParseSubSup(this.flattenBracket({ type: "Bracket", leftDelim, rightDelim, content }));
  }

  flattenBracket(br) {
    if (br.content.type === "Bracket") {
      const inner = br.content;
      if (br.leftDelim === inner.leftDelim && br.rightDelim === inner.rightDelim && (br.leftDelim === "{" || br.leftDelim === "")) return inner;
    }
    return br;
  }

  removeBracket(br) {
    if (br.leftDelim === "{" || br.leftDelim === "") return br.content;
    return br;
  }

  parseGroupExpression() {
    if (!this.matchSymbol("{")) return this.parseFactor();
    this.next();
    const expr = this.parseExpression();
    if (this.matchSymbol("}")) this.next();
    return expr;
  }

  parseBeginEnv() {
    if (!this.matchSymbol("{")) return { type: "Literal", value: "begin" };
    this.next();
    const envTok = this.peek();
    let envName = "";
    if (envTok.type === TokenType.IDENT || envTok.type === TokenType.KEYWORD) {
      envName = envTok.value.toLowerCase();
      this.next();
    }
    if (this.matchSymbol("}")) this.next();

    let alignSpec = null;
    if (envName === "array" && this.matchSymbol("{")) {
      this.next();
      let raw = "";
      while (!this.matchSymbol("}") && this.peek().type !== TokenType.EOF) raw += this.next().value;
      if (this.matchSymbol("}")) this.next();
      alignSpec = raw;
    }

    const { rows, consumed } = splitLatexRows(this.tokens.slice(this.pos), envName);
    this.pos += consumed;
    this.parseEndEnv(envName);
    return this.maybeParseSubSup({ type: "BeginEnv", envName, rows, alignSpec });
  }

  parseEndEnv(envName) {
    if (!this.matchKeyword("end")) return;
    this.next();
    if (!this.matchSymbol("{")) return;
    this.next();
    const n = this.peek();
    if ((n.type === TokenType.IDENT || n.type === TokenType.KEYWORD) && n.value.toLowerCase() === envName) this.next();
    if (this.matchSymbol("}")) this.next();
  }

  parseSubOrSupContent() {
    if (this.matchSymbol("{")) {
      this.next();
      const expr = this.parseExpression();
      if (this.matchSymbol("}")) this.next();
      return expr;
    }
    const t = this.peek();
    if (t.type !== TokenType.EOF) {
      this.next();
      return { type: "Literal", value: t.value };
    }
    return { type: "Literal", value: "" };
  }

  maybeParseSubSup(base) {
    let node = base;
    while (true) {
      if (this.matchSymbol("^")) {
        this.next();
        node = { type: "Superscript", base: node, exponent: this.parseSubOrSupContent() };
        continue;
      }
      if (this.matchSymbol("_")) {
        this.next();
        node = { type: "Subscript", base: node, sub: this.parseSubOrSupContent() };
        continue;
      }
      break;
    }
    return node;
  }
}

function envNameToLatex(node) {
  if (node.envName === "dmatrix") return { envName: "vmatrix" };
  if (node.envName === "pile") return { envName: "array", alignSpec: "c" };
  if (node.envName === "lpile") return { envName: "array", alignSpec: "l" };
  if (node.envName === "rpile") return { envName: "array", alignSpec: "r" };
  if (node.envName === "eqalign") return { envName: "aligned" };
  return { envName: node.envName, alignSpec: node.alignSpec || node.columnAlignSpec || null };
}

function envNameToHwp(node) {
  if (node.envName === "vmatrix") return { envName: "dmatrix" };
  if (node.envName === "aligned") return { envName: "eqalign" };
  if (node.envName === "array") {
    const cleanAlign = sanitizeArrayAlignSpec(node.alignSpec);
    if (cleanAlign === "l") return { envName: "lpile" };
    if (cleanAlign === "r") return { envName: "rpile" };
    if (cleanAlign === "c") return { envName: "pile" };
    if (cleanAlign && cleanAlign.length > 1) return { envName: "matrix", columnAlignSpec: cleanAlign };
    return { envName: "eqalign" };
  }
  return { envName: node.envName, alignSpec: node.alignSpec || null, columnAlignSpec: node.columnAlignSpec || null };
}

function toLatex(node) {
  switch (node.type) {
    case "Literal":
      return literalToLatex(node.value);
    case "FunctionName":
      return functionNameToLatex(node.value);
    case "Text":
      return `\\text{${node.value}}`;
    case "Styled":
      return `${STYLE_TO_LATEX[node.style] || "\\mathrm"}{${toLatex(node.child)}}`;
    case "UnaryOp":
      return `${node.operator}${toLatex(node.child)}`;
    case "Negation":
      return `\\not${toLatex(node.child)}`;
    case "SizedLiteral":
      return `\\${node.size}${toLatex(node.child)}`;
    case "Choose":
      return `\\binom{${toLatex(node.total)}}{${toLatex(node.choose)}}`;
    case "Relation": {
      const arrow = operatorToLatex(node.arrow);
      const decorated = node.below
        ? `\\overset{${toLatex(node.above)}}{\\underset{${toLatex(node.below)}}{${arrow}}}`
        : `\\overset{${toLatex(node.above)}}{${arrow}}`;
      return `${toLatex(node.left)} ${decorated} ${toLatex(node.right)}`;
    }
    case "BinaryOp": {
      const left = toLatex(node.left);
      const right = toLatex(node.right);
      if (node.operator === "apply") return `${left}${right}`;
      if (node.operator === "") return formatImplicitJoin(node, left, right);
      if (node.operator === "times") return `${left} \\times ${right}`;
      return `${left} ${operatorToLatex(node.operator)} ${right}`;
    }
    case "Fraction":
      return node.withBar
        ? `\\frac{${toLatex(node.numerator)}}{${toLatex(node.denominator)}}`
        : `{${toLatex(node.numerator)} \\atop ${toLatex(node.denominator)}}`;
    case "Root":
      return `\\sqrt{${toLatex(node.radicand)}}`;
    case "Superscript":
      return `${toLatex(node.base)}^{${toLatex(node.exponent)}}`;
    case "Subscript":
      return `${toLatex(node.base)}_{${toLatex(node.sub)}}`;
    case "Integral": {
      let out = node.variant === "int" ? "\\int" : "\\oint";
      if (node.lower) out += `_{${toLatex(node.lower)}}`;
      if (node.upper) out += `^{${toLatex(node.upper)}}`;
      if (node.body) out += ` ${toLatex(node.body)}`;
      return out;
    }
    case "Summation": {
      let out = "\\sum";
      if (node.lower) out += `_{${toLatex(node.lower)}}`;
      if (node.upper) out += `^{${toLatex(node.upper)}}`;
      if (node.body) out += ` ${toLatex(node.body)}`;
      return out;
    }
    case "Decorated":
      return `${DECORATION_TO_LATEX[node.decoType] || ("\\" + node.decoType)}{${toLatex(node.child)}}`;
    case "BeginEnv": {
      const mapped = envNameToLatex(node);
      const rowStr = renderLatexEnvRows(node.rows);
      const matrixAlign = sanitizeArrayAlignSpec(node.columnAlignSpec || mapped.alignSpec);
      if (isHwpMatrixEnvName(node.envName) && matrixAlign && /[^c]/.test(matrixAlign)) {
        const delimiters = matrixDelimitersToLatex(node.envName);
        const arrayLatex = `\\begin{array}{${matrixAlign}} ${rowStr} \\end{array}`;
        return delimiters.left ? `${delimiters.left} ${arrayLatex} ${delimiters.right}` : arrayLatex;
      }
      if (mapped.envName === "array") return `\\begin{array}{${sanitizeArrayAlignSpec(mapped.alignSpec) || "c"}} ${rowStr} \\end{array}`;
      return `\\begin{${mapped.envName}} ${rowStr} \\end{${mapped.envName}}`;
    }
    case "Bracket": {
      const content = toLatex(node.content);
      if (node.leftDelim.startsWith("LEFT")) {
        const left = `\\left${node.leftDelim.slice(4)}`;
        const right = node.rightDelim.startsWith("RIGHT") ? `\\right${node.rightDelim.slice(5)}` : "";
        return `${left} ${content} ${right}`;
      }
      if (node.leftDelim.startsWith("\\left")) return `${node.leftDelim} ${content} ${node.rightDelim}`;
      return `${node.leftDelim}${content}${node.rightDelim}`;
    }
    default:
      return "";
  }
}

function toHwpEqn(node) {
  switch (node.type) {
    case "Literal":
      return literalToHwp(node.value);
    case "FunctionName":
      return node.value;
    case "Text":
      return `"${node.value}"`;
    case "Styled":
      return `${node.style} ${wrapStyledChildForHwp(node.child)}`;
    case "UnaryOp":
      return `${node.operator}${toHwpEqn(node.child)}`;
    case "Negation":
      return `not ${toHwpEqn(node.child)}`;
    case "SizedLiteral":
      return `bigg ${toHwpEqn(node.child)}`;
    case "Choose":
      return `${toHwpEqn(node.total)} choose ${toHwpEqn(node.choose)}`;
    case "Relation": {
      const keyword = node.below ? "REL" : "BUILDREL";
      let out = `${toHwpEqn(node.left)} ${keyword} ${literalToHwp(node.arrow)} {${toHwpEqn(node.above)}}`;
      if (node.below) out += ` {${toHwpEqn(node.below)}}`;
      out += ` ${toHwpEqn(node.right)}`;
      return out;
    }
    case "BinaryOp": {
      const left = toHwpEqn(node.left);
      const right = toHwpEqn(node.right);
      if (node.operator === "apply") return `${left}${right}`;
      if (node.operator === "") return formatImplicitJoin(node, left, right);
      if (node.operator === "times") return `${left} times ${right}`;
      return `${left} ${node.operator} ${right}`;
    }
    case "Fraction":
      return node.withBar
        ? `{${toHwpEqn(node.numerator)}} over {${toHwpEqn(node.denominator)}}`
        : `{${toHwpEqn(node.numerator)}} atop {${toHwpEqn(node.denominator)}}`;
    case "Root":
      return `sqrt{${toHwpEqn(node.radicand)}}`;
    case "Superscript":
      return `${toHwpEqn(node.base)}^{${toHwpEqn(node.exponent)}}`;
    case "Subscript":
      return `${toHwpEqn(node.base)}_{${toHwpEqn(node.sub)}}`;
    case "Integral": {
      let out = node.variant === "int" ? "int" : "oint";
      if (node.lower) out += `_{${toHwpEqn(node.lower)}}`;
      if (node.upper) out += `^{${toHwpEqn(node.upper)}}`;
      if (node.body) out += ` ${toHwpEqn(node.body)}`;
      return out;
    }
    case "Summation": {
      let out = "sum";
      if (node.lower) out += `_{${toHwpEqn(node.lower)}}`;
      if (node.upper) out += `^{${toHwpEqn(node.upper)}}`;
      if (node.body) out += ` ${toHwpEqn(node.body)}`;
      return out;
    }
    case "Decorated":
      return `${node.decoType} ${toHwpEqn(node.child)}`;
    case "BeginEnv": {
      const mapped = envNameToHwp(node);
      if (mapped.columnAlignSpec && isHwpMatrixEnvName(mapped.envName)) {
        return formatHwpMatrixColumnMode(mapped.envName, node.rows, mapped.columnAlignSpec);
      }
      const rowStr = node.rows.map(row => row.map(cell => toHwpEqn(cell)).join(" & ")).join(" # ");
      return `${mapped.envName}{${rowStr}}`;
    }
    case "Bracket": {
      if (node.content.type === "BeginEnv" && node.content.envName === "array") {
        const matrixAlign = sanitizeArrayAlignSpec(node.content.alignSpec);
        if (matrixAlign && matrixAlign.length > 1) {
          const envName = bracketDelimitersToHwpMatrixEnv(node.leftDelim, node.rightDelim);
          return formatHwpMatrixColumnMode(envName, node.content.rows, matrixAlign);
        }
      }
      const content = toHwpEqn(node.content);
      if (node.leftDelim.startsWith("\\left")) {
        const left = `LEFT${node.leftDelim.slice(5)}`;
        const right = node.rightDelim.startsWith("\\right") ? `RIGHT${node.rightDelim.slice(6)}` : "";
        return `${left} ${content} ${right}`;
      }
      return `${node.leftDelim}${content}${node.rightDelim}`;
    }
    default:
      return "";
  }
}

// ═══════════════════════════════════════════════════════════
// App Logic
// ═══════════════════════════════════════════════════════════
let mode = 'latex2hwp';

const inputArea = document.getElementById('input-area');
const outputArea = document.getElementById('output-area');
const inputLabel = document.getElementById('input-label');
const outputLabel = document.getElementById('output-label');
const preview = document.getElementById('preview');
const modeBtns = document.querySelectorAll('.mode-btn');
const convertBtn = document.getElementById('convert-btn');
const exampleChips = document.getElementById('example-chips');

const examples = {
  hwp2latex: [
    { label: 'x^2 + y^2', value: 'x^2 + y^2' },
    { label: 'y^2 over z', value: 'y^2 over z' },
    { label: 'int_1^2 {x^3}', value: 'int_1^2 {x^3}' },
    { label: 'sqrt {a + b}', value: 'sqrt {a + b}' },
    { label: 'sum_1^n {k^2}', value: 'sum_1^n {k^2}' },
    { label: 'pmatrix{1 & 2 # 3 & 4}', value: 'pmatrix{1 & 2 # 3 & 4}' },
    { label: 'bmatrix{lcol{a # c} rcol{b # d}}', value: 'bmatrix{lcol{a # c} rcol{b # d}}' },
  ],
  latex2hwp: [
    { label: 'x^{2} + y^{2}', value: 'x^{2} + y^{2}' },
    { label: '\\frac{y^2}{z}', value: '\\frac{y^2}{z}' },
    { label: '\\int_{1}^{2} {x^3}', value: '\\int_{1}^{2} {x^3}' },
    { label: '\\sqrt{a + b}', value: '\\sqrt{a + b}' },
    { label: '\\sum_{1}^{n} {k^2}', value: '\\sum_{1}^{n} {k^2}' },
    { label: '\\begin{cases} x=1 \\\\ y=2 \\end{cases}', value: '\\begin{cases} x=1 \\\\ y=2 \\end{cases}' },
    { label: '\\left[\\begin{array}{lr} a & b \\\\ c & d \\end{array}\\right]', value: '\\left[\\begin{array}{lr} a & b \\\\ c & d \\end{array}\\right]' },
  ]
};

function setMode(m) {
  mode = m;
  modeBtns.forEach(b => b.classList.toggle('active', b.dataset.mode === m));
  if (m === 'hwp2latex') { inputLabel.textContent = 'HWP Equation'; outputLabel.textContent = 'LaTeX'; inputArea.placeholder = 'x times 3 + y^2 over z'; }
  else { inputLabel.textContent = 'LaTeX'; outputLabel.textContent = 'HWP Equation'; inputArea.placeholder = '\\frac{y^2}{z} + \\int_{1}^{2} {x^3}'; }
  inputArea.value = ''; outputArea.value = ''; preview.innerHTML = '';
  renderExamples();
}

function renderExamples() {
  exampleChips.innerHTML = '';
  for (const ex of examples[mode]) {
    const chip = document.createElement('button');
    chip.className = 'example-chip';
    chip.textContent = ex.label;
    chip.addEventListener('click', () => { inputArea.value = ex.value; convert(); });
    exampleChips.appendChild(chip);
  }
}

function stripDollarSigns(s) {
  return s.replace(/^\$\$?/, '').replace(/\$\$?$/, '').trim();
}

function convert() {
  let input = inputArea.value.trim();
  if (!input) { outputArea.value = ''; preview.innerHTML = ''; return; }
  if (mode === 'latex2hwp') input = stripDollarSigns(input);
  try {
    let tokens, ast, result, latexForPreview;
    if (mode === 'hwp2latex') {
      tokens = tokenizeHwpEqn(input);
      ast = new HwpParser(tokens).parseExpression();
      result = toLatex(ast).trim();
      latexForPreview = result;
    } else {
      tokens = tokenizeLatex(input);
      ast = new LatexParser(tokens).parseExpression();
      result = toHwpEqn(ast).trim();
      latexForPreview = input;
    }
    outputArea.value = result;
    try {
      katex.render(latexForPreview, preview, { throwOnError: false, displayMode: true });
    } catch(e) {
      preview.innerHTML = `<span class="preview-error">Preview not available</span>`;
    }
  } catch(e) {
    outputArea.value = 'Error: ' + e.message;
    preview.innerHTML = `<span class="preview-error">${e.message}</span>`;
  }
}

function handleCopy(btn, textarea) {
  const text = textarea.value.trim();
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    btn.classList.add('copied');
    btn.querySelector('span').textContent = 'Copied!';
    btn.querySelector('svg').innerHTML = '<polyline points="20 6 9 17 4 12"/>';
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.querySelector('span').textContent = 'Copy';
      btn.querySelector('svg').innerHTML = '<rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>';
    }, 1500);
  });
}

document.getElementById('copy-input').addEventListener('click', function() { handleCopy(this, inputArea); });
document.getElementById('copy-output').addEventListener('click', function() { handleCopy(this, outputArea); });

modeBtns.forEach(b => b.addEventListener('click', () => setMode(b.dataset.mode)));
convertBtn.addEventListener('click', convert);
inputArea.addEventListener('input', convert);
setMode('latex2hwp');
</script>
</body>
