<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HWP 수식 변환기</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #fdf8f4;
    --surface: #ffffff;
    --surface2: #faf5f0;
    --border: #f0e4da;
    --pink: #d4849a;
    --pink-glow: #d4849a20;
    --accent: #b07aaf;
    --text: #3d3535;
    --text-dim: #9a8a85;
    --radius: 16px;
  }

  body {
    font-family: 'Inter', 'Noto Sans KR', sans-serif;
    background: linear-gradient(180deg, #fdf8f4 0%, #fef0f0 40%, #fdf5f0 100%);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* ── Cherry Blossom Canvas ── */
  #sakura-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  /* ── Main Layout ── */
  .app {
    position: relative;
    z-index: 1;
    max-width: 960px;
    margin: 0 auto;
    padding: 40px 24px 60px;
  }

  /* ── Header ── */
  .header {
    text-align: center;
    margin-bottom: 48px;
  }
  .header h1 {
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #f2a0b7, #c084fc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header p {
    color: var(--text-dim);
    font-size: 0.9rem;
    margin-top: 8px;
    font-weight: 300;
  }

  /* ── Mode Toggle ── */
  .mode-toggle {
    display: flex;
    justify-content: center;
    gap: 4px;
    margin-bottom: 32px;
    background: var(--surface);
    border-radius: 12px;
    padding: 4px;
    width: fit-content;
    margin-left: auto;
    margin-right: auto;
    border: 1px solid var(--border);
  }
  .mode-btn {
    padding: 10px 24px;
    border: none;
    border-radius: 10px;
    background: transparent;
    color: var(--text-dim);
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s ease;
    font-family: inherit;
  }
  .mode-btn.active {
    background: linear-gradient(135deg, #f8dde4, #f0d4ef);
    color: var(--pink);
    box-shadow: 0 4px 12px var(--pink-glow);
  }
  .mode-btn:hover:not(.active) {
    color: var(--text);
  }

  /* ── Converter Panel ── */
  .converter {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 16px;
    align-items: stretch;
    margin-bottom: 32px;
  }
  @media (max-width: 700px) {
    .converter {
      grid-template-columns: 1fr;
    }
    .arrow-col { transform: rotate(90deg); }
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    display: flex;
    flex-direction: column;
    transition: border-color 0.3s;
  }
  .panel {
    box-shadow: 0 2px 12px rgba(0,0,0,0.04);
  }
  .panel:focus-within {
    border-color: var(--pink);
    box-shadow: 0 4px 20px var(--pink-glow);
  }
  .panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .panel-label {
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
  }
  .copy-btn {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 5px 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface2);
    color: var(--text-dim);
    font-size: 0.7rem;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.25s;
  }
  .copy-btn:hover {
    border-color: var(--pink);
    color: var(--pink);
    background: #fef5f7;
  }
  .copy-btn.copied {
    border-color: #86c68a;
    color: #5a9e5e;
    background: #f0faf0;
  }
  .copy-btn svg {
    width: 13px; height: 13px;
    fill: none;
    stroke: currentColor;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .panel textarea {
    flex: 1;
    min-height: 140px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    color: var(--text);
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    font-size: 0.9rem;
    resize: vertical;
    outline: none;
    transition: border-color 0.3s;
    line-height: 1.6;
  }
  .panel textarea:focus {
    border-color: var(--pink);
  }
  .panel textarea::placeholder {
    color: var(--text-dim);
    opacity: 0.5;
  }

  /* ── Arrow ── */
  .arrow-col {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .arrow-btn {
    width: 48px; height: 48px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--pink);
    font-size: 1.2rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s;
  }
  .arrow-btn:hover {
    background: linear-gradient(135deg, #f8dde4, #f0d4ef);
    box-shadow: 0 4px 16px var(--pink-glow);
    transform: scale(1.1);
  }
  .arrow-btn svg {
    width: 20px; height: 20px;
    fill: none;
    stroke: currentColor;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* ── Preview ── */
  .preview-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    min-height: 80px;
    text-align: center;
  }
  .preview-label {
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    margin-bottom: 16px;
  }
  .preview-content {
    font-size: 1.4rem;
    color: var(--text);
    overflow-x: auto;
    padding: 8px 0;
  }
  .preview-content .katex { font-size: 1.6em; }
  .preview-error {
    color: #f87171;
    font-size: 0.85rem;
    font-style: italic;
  }

  /* ── Examples ── */
  .examples {
    margin-top: 32px;
  }
  .examples-title {
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    margin-bottom: 12px;
    text-align: center;
  }
  .example-chips {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
  }
  .example-chip {
    padding: 8px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text-dim);
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.3s;
    font-family: 'JetBrains Mono', monospace;
  }
  .example-chip:hover {
    border-color: var(--pink);
    color: var(--pink);
    background: #fef5f7;
    box-shadow: 0 2px 10px var(--pink-glow);
  }

  /* ── Footer ── */
  .footer {
    text-align: center;
    margin-top: 48px;
    color: var(--text-dim);
    font-size: 0.75rem;
  }
  .footer a {
    color: var(--pink);
    text-decoration: none;
  }
</style>
</head>
<body>

<svg id="sakura-canvas"></svg>

<div class="app">
  <div class="header">
    <h1>HWP 수식 변환기</h1>
    <p>한글(HWP) 수식과 LaTeX를 간편하게 변환하세요</p>
  </div>

  <div class="mode-toggle">
    <button class="mode-btn" data-mode="hwp2latex">HWP &rarr; LaTeX</button>
    <button class="mode-btn active" data-mode="latex2hwp">LaTeX &rarr; HWP</button>
  </div>

  <div class="converter">
    <div class="panel" id="input-panel">
      <div class="panel-header">
        <div class="panel-label" id="input-label">HWP Equation</div>
        <button class="copy-btn" id="copy-input" title="Copy">
          <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          <span>Copy</span>
        </button>
      </div>
      <textarea id="input-area" placeholder="x times 3 + y^2 over z" spellcheck="false"></textarea>
    </div>
    <div class="arrow-col">
      <button class="arrow-btn" id="convert-btn" title="Convert">
        <svg viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
      </button>
    </div>
    <div class="panel" id="output-panel">
      <div class="panel-header">
        <div class="panel-label" id="output-label">LaTeX</div>
        <button class="copy-btn" id="copy-output" title="Copy">
          <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          <span>Copy</span>
        </button>
      </div>
      <textarea id="output-area" readonly placeholder="Result will appear here..." spellcheck="false"></textarea>
    </div>
  </div>

  <div class="preview-section">
    <div class="preview-label">Math Preview</div>
    <div class="preview-content" id="preview"></div>
  </div>

  <div class="examples">
    <div class="examples-title">Examples</div>
    <div class="example-chips" id="example-chips"></div>
  </div>

</div>

<script>
// ═══════════════════════════════════════════════════════════
// Cherry Blossom Particle System (SVG + mouse wind)
// ═══════════════════════════════════════════════════════════
(function() {
  const svg = document.getElementById('sakura-canvas');
  const NS = 'http://www.w3.org/2000/svg';
  let W = window.innerWidth, H = window.innerHeight;
  let mouseX = W / 2, mouseY = H / 2;
  let mouseVX = 0, mouseVY = 0;
  let prevMouseX = mouseX, prevMouseY = mouseY;

  // Ambient wind — constant gentle breeze blowing diagonally
  let ambientWindX = 0.4, ambientWindY = 0.1;
  // Gust system — occasional stronger wind bursts
  let gustX = 0, gustY = 0, gustTimer = 0, gustDuration = 0;
  // Mouse-driven wind
  let mouseWindX = 0, mouseWindY = 0;

  window.addEventListener('resize', () => { W = window.innerWidth; H = window.innerHeight; });
  window.addEventListener('mousemove', e => {
    prevMouseX = mouseX; prevMouseY = mouseY;
    mouseX = e.clientX; mouseY = e.clientY;
    mouseVX = mouseX - prevMouseX;
    mouseVY = mouseY - prevMouseY;
  });

  // SVG defs for blur layers
  const defs = document.createElementNS(NS, 'defs');
  // Near layer blur (large petals, slightly soft)
  const filterNear = document.createElementNS(NS, 'filter');
  filterNear.setAttribute('id', 'blur-near');
  const feNear = document.createElementNS(NS, 'feGaussianBlur');
  feNear.setAttribute('stdDeviation', '0.8');
  filterNear.appendChild(feNear);
  defs.appendChild(filterNear);
  // Far layer blur (small petals, more blur)
  const filterFar = document.createElementNS(NS, 'filter');
  filterFar.setAttribute('id', 'blur-far');
  const feFar = document.createElementNS(NS, 'feGaussianBlur');
  feFar.setAttribute('stdDeviation', '1.5');
  filterFar.appendChild(feFar);
  defs.appendChild(filterFar);
  svg.appendChild(defs);

  function createPetalShape(depth) {
    const g = document.createElementNS(NS, 'g');
    const petal = document.createElementNS(NS, 'path');
    // Vary size by depth: far=small, near=large
    const baseSize = depth < 0.33 ? (3 + Math.random() * 3) :
                     depth < 0.66 ? (5 + Math.random() * 5) :
                                    (8 + Math.random() * 7);
    const s = baseSize;
    // Organic petal shape
    petal.setAttribute('d', `M0,0 C${s*0.35},${-s*0.55} ${s*1.05},${-s*0.25} ${s*0.55},${s*0.25} C${s*0.25},${s*0.55} ${s*0.08},${s*0.3} 0,0 Z`);

    const hue = 335 + Math.random() * 18;
    const sat = 50 + Math.random() * 35;
    const light = 78 + Math.random() * 14;
    // Opacity varies by depth: far petals are more transparent
    const alpha = depth < 0.33 ? (0.15 + Math.random() * 0.15) :
                  depth < 0.66 ? (0.25 + Math.random() * 0.2) :
                                 (0.35 + Math.random() * 0.25);
    petal.setAttribute('fill', `hsla(${hue}, ${sat}%, ${light}%, ${alpha})`);
    g.appendChild(petal);

    // Subtle vein
    const vein = document.createElementNS(NS, 'line');
    vein.setAttribute('x1', '0'); vein.setAttribute('y1', '0');
    vein.setAttribute('x2', String(s * 0.4)); vein.setAttribute('y2', String(s * 0.06));
    vein.setAttribute('stroke', `hsla(${hue}, 70%, 90%, ${alpha * 0.3})`);
    vein.setAttribute('stroke-width', '0.3');
    g.appendChild(vein);

    // Apply blur based on depth
    if (depth < 0.33) g.setAttribute('filter', 'url(#blur-far)');
    else if (depth > 0.8) g.setAttribute('filter', 'url(#blur-near)');

    return g;
  }

  const PETAL_COUNT = 120;
  const petals = [];

  for (let i = 0; i < PETAL_COUNT; i++) {
    const depth = Math.random(); // 0=far, 1=near
    const el = createPetalShape(depth);
    svg.appendChild(el);

    // Speed scales with depth (parallax)
    const speedMul = 0.3 + depth * 0.7;

    petals.push({
      el, depth, speedMul,
      x: Math.random() * (W + 400) - 200,
      y: Math.random() * (H + 200) - 200,
      vx: 0, vy: 0,
      // Rotation on Z axis (2D rotation)
      rotZ: Math.random() * 360,
      rotZSpeed: (Math.random() - 0.5) * 0.6,
      // Simulated 3D tumble via scaleX oscillation
      flipPhase: Math.random() * Math.PI * 2,
      flipSpeed: 0.3 + Math.random() * 0.8,
      // Spiral / swirl motion
      swirlPhase: Math.random() * Math.PI * 2,
      swirlSpeed: 0.15 + Math.random() * 0.35,
      swirlRadius: 8 + Math.random() * 20,
      // Base fall speed (very gentle)
      baseFallSpeed: (0.1 + Math.random() * 0.2) * speedMul,
      // Base drift speed (horizontal)
      baseDriftSpeed: (0.15 + Math.random() * 0.3) * speedMul,
      scale: depth < 0.33 ? 0.4 + Math.random() * 0.3 :
             depth < 0.66 ? 0.6 + Math.random() * 0.4 :
                            0.8 + Math.random() * 0.5
    });
  }

  let time = 0;
  function animate() {
    time += 0.016;

    // Mouse wind — smooth follow
    mouseWindX += (mouseVX * 0.08 - mouseWindX) * 0.02;
    mouseWindY += (mouseVY * 0.04 - mouseWindY) * 0.02;
    mouseVX *= 0.95; mouseVY *= 0.95;

    // Ambient wind gentle oscillation
    ambientWindX = 0.35 + Math.sin(time * 0.1) * 0.15;
    ambientWindY = 0.05 + Math.sin(time * 0.07 + 1.5) * 0.05;

    // Random gust system
    gustTimer -= 0.016;
    if (gustTimer <= 0) {
      // Trigger a new gust
      gustDuration = 2 + Math.random() * 4;
      gustTimer = gustDuration + 5 + Math.random() * 12; // wait before next gust
      const angle = Math.random() * Math.PI * 0.5 - Math.PI * 0.25; // mostly rightward
      const strength = 0.5 + Math.random() * 1.5;
      gustX = Math.cos(angle) * strength;
      gustY = Math.sin(angle) * strength * 0.3;
    }
    // Gust fades in and out
    let gustFade = 0;
    const gustAge = gustDuration - (gustTimer - (5 + 6)); // approximate
    if (gustTimer > 5) {
      // During gust
      const elapsed = gustDuration - (gustTimer - 5 - Math.random() * 7);
      gustFade = Math.sin(Math.min(1, Math.max(0, (gustDuration - (gustTimer - 5)) / gustDuration)) * Math.PI);
    }
    // Simpler: fade gust based on remaining time above threshold
    const inGust = gustTimer > 5;
    if (inGust) {
      const progress = 1 - (gustTimer - 5) / gustDuration;
      gustFade = Math.sin(progress * Math.PI); // 0 -> 1 -> 0
    } else {
      gustFade = 0;
    }

    const totalWindX = ambientWindX + gustX * gustFade + mouseWindX;
    const totalWindY = ambientWindY + gustY * gustFade + mouseWindY;

    for (const p of petals) {
      // Wind influence (depth-based: near petals react more)
      const windInfluence = p.speedMul;

      // Swirl motion — creates spiraling paths
      const swirlX = Math.sin(time * p.swirlSpeed + p.swirlPhase) * p.swirlRadius * 0.008 * windInfluence;
      const swirlY = Math.cos(time * p.swirlSpeed * 0.7 + p.swirlPhase) * p.swirlRadius * 0.004 * windInfluence;

      // Mouse proximity push (gentle)
      const distX = p.x - mouseX;
      const distY = p.y - mouseY;
      const dist = Math.sqrt(distX * distX + distY * distY);
      const mouseInfluence = Math.max(0, 1 - dist / 200) * 0.02;
      const pushX = distX * mouseInfluence;
      const pushY = distY * mouseInfluence;

      // Accumulate velocity
      p.vx += (totalWindX * windInfluence * 0.015) + swirlX + pushX;
      p.vy += (p.baseFallSpeed * 0.03) + (totalWindY * windInfluence * 0.01) + swirlY + pushY;

      // Damping
      p.vx *= 0.97;
      p.vy *= 0.98;

      // Clamp
      const maxSpeed = 1.5 * p.speedMul;
      p.vx = Math.max(-maxSpeed, Math.min(maxSpeed, p.vx));
      p.vy = Math.max(-0.5, Math.min(maxSpeed * 0.8, p.vy));

      // Position update
      p.x += p.vx + p.baseDriftSpeed * totalWindX * 0.3;
      p.y += p.vy + p.baseFallSpeed;

      // Z rotation (tumble)
      p.rotZ += p.rotZSpeed + totalWindX * windInfluence * 0.3;

      // 3D flip simulation (scaleX oscillation)
      const flip = Math.cos(time * p.flipSpeed + p.flipPhase);
      const scaleX = p.scale * (0.3 + Math.abs(flip) * 0.7);
      const scaleY = p.scale;

      // Wrap around — generous margins
      if (p.y > H + 60) { p.y = -60 - Math.random() * 100; p.x = Math.random() * (W + 400) - 200; }
      if (p.x > W + 100) { p.x = -80; p.y = Math.random() * H * 0.5; }
      if (p.x < -100) { p.x = W + 80; p.y = Math.random() * H * 0.5; }

      p.el.setAttribute('transform',
        `translate(${p.x.toFixed(1)},${p.y.toFixed(1)}) rotate(${p.rotZ.toFixed(1)}) scale(${scaleX.toFixed(2)},${scaleY.toFixed(2)})`
      );
    }

    requestAnimationFrame(animate);
  }
  animate();
})();

// ═══════════════════════════════════════════════════════════
// HWP-EQN-TS Library (bundled as plain JS)
// ═══════════════════════════════════════════════════════════
const TokenType = { KEYWORD: 0, IDENT: 1, NUMBER: 2, SYMBOL: 3, SPACE: 4, EOF: 5, UNKNOWN: 6 };

function isAlpha(ch) { return /^[A-Za-z]$/.test(ch); }
function isDigit(ch) { return /^[0-9]$/.test(ch); }

// ── HWP Tokenizer ──
const HWP_KEYWORDS = new Set([
  "TIMES","OVER","ATOP","SQRT","INT","OINT","SUM",
  "ACUTE","GRAVE","DOT","DDOT","BAR","VEC","DYAD","UNDER",
  "HAT","ARCH","CHECK","TILDE","LEFT","RIGHT","PMATRIX","CASES"
]);

function tokenizeHwpEqn(input) {
  const tokens = [];
  let i = 0;
  while (i < input.length) {
    const ch = input[i];
    if (/\s/.test(ch)) { tokens.push({type:TokenType.SPACE,value:ch}); i++; continue; }
    if (isDigit(ch)) {
      let num=ch; i++;
      while(i<input.length&&isDigit(input[i])){num+=input[i];i++;}
      if(i<input.length&&input[i]==='.'&&i+1<input.length&&isDigit(input[i+1])){
        num+=input[i];i++;
        while(i<input.length&&isDigit(input[i])){num+=input[i];i++;}
      }
      tokens.push({type:TokenType.NUMBER,value:num}); continue;
    }
    if ("^_{}()#&~'/,.-+=*\\[]".includes(ch)) {
      if (ch==='\\' && i+1<input.length && input[i+1]==='\\') { tokens.push({type:TokenType.SYMBOL,value:"\\\\"}); i+=2; continue; }
      tokens.push({type:TokenType.SYMBOL,value:ch}); i++; continue;
    }
    if (isAlpha(ch)) {
      let ident=ch; i++; while(i<input.length&&isAlpha(input[i])){ident+=input[i];i++;}
      const up=ident.toUpperCase();
      if (HWP_KEYWORDS.has(up)) tokens.push({type:TokenType.KEYWORD,value:up});
      else tokens.push({type:TokenType.IDENT,value:ident});
      continue;
    }
    tokens.push({type:TokenType.UNKNOWN,value:ch}); i++;
  }
  tokens.push({type:TokenType.EOF,value:""}); return tokens;
}

// ── LaTeX Tokenizer ──
const LATEX_KEYWORDS = new Set(["int","oint","sum","sqrt","frac","acute","grave","dot","ddot","bar","vec","hat","tilde","times","left","right","begin","end"]);

function tokenizeLatex(input) {
  const tokens = [];
  let i = 0;
  while (i < input.length) {
    const ch = input[i];
    if (/\s/.test(ch)) { tokens.push({type:TokenType.SPACE,value:ch}); i++; continue; }
    if (isDigit(ch)) {
      let num=ch; i++;
      while(i<input.length&&isDigit(input[i])){num+=input[i];i++;}
      if(i<input.length&&input[i]==='.'&&i+1<input.length&&isDigit(input[i+1])){
        num+=input[i];i++;
        while(i<input.length&&isDigit(input[i])){num+=input[i];i++;}
      }
      tokens.push({type:TokenType.NUMBER,value:num}); continue;

// ── AST -> LaTeX ──
function unifyCaseRow(strs) { if(strs.length===3&&strs[1]==="=") return [strs[0]+" = "+strs[2]]; return strs; }

function toLatex(node) {
  switch(node.type) {
    case "Literal": return node.value;
    case "BinaryOp": {
      const l=toLatex(node.left), r=toLatex(node.right);
      if(node.operator==="apply"||node.operator==="") return `${l}${r}`;
      if(node.operator==="times") return `${l} \\times ${r}`;
      return `${l} ${node.operator} ${r}`;
    }
    case "Fraction": return node.withBar ? `\\frac{${toLatex(node.numerator)}}{${toLatex(node.denominator)}}` : `\\begin{array}{c} ${toLatex(node.numerator)} \\atop ${toLatex(node.denominator)} \\end{array}`;
    case "Root": return `\\sqrt{${toLatex(node.radicand)}}`;
    case "Superscript": return `${toLatex(node.base)}^{${toLatex(node.exponent)}}`;
    case "Subscript": return `${toLatex(node.base)}_{${toLatex(node.sub)}}`;
    case "Integral": { const cmd=node.variant==="int"?"\\int":"\\oint"; let lo="",up=""; if(node.lower)lo=`_{${toLatex(node.lower)}}`; if(node.upper)up=`^{${toLatex(node.upper)}}`; const body=node.body?` {${toLatex(node.body)}}`:""; return `${cmd}${lo}${up}${body}`; }
    case "Summation": { let lo="",up=""; if(node.lower)lo=`_{${toLatex(node.lower)}}`; if(node.upper)up=`^{${toLatex(node.upper)}}`; const body=node.body?` {${toLatex(node.body)}}`:""; return `\\sum${lo}${up}${body}`; }
    case "Decorated": {
      const c=toLatex(node.child);
      const map={acute:"\\acute",grave:"\\grave",dot:"\\dot",ddot:"\\ddot",bar:"\\bar",vec:"\\vec",hat:"\\hat",tilde:"\\tilde"};
      return (map[node.decoType]||"\\"+node.decoType)+`{${c}}`;
    }
    case "BeginEnv": { const rowStrs=node.rows.map(r=>{const colStr=unifyCaseRow(r.map(e=>toLatex(e)));return colStr.join(" & ");}).join(" \\\\ "); return `\\begin{${node.envName}} ${rowStrs} \\end{${node.envName}}`; }
    case "Bracket": {
      const content=toLatex(node.content);
      if(node.leftDelim.startsWith("LEFT")) { const c=node.leftDelim.slice(4); let left=`\\left${c}`,right=""; if(node.rightDelim.startsWith("RIGHT")){const c2=node.rightDelim.slice(5);right=`\\right${c2}`;} return ` ${left} ${content} ${right}`; }
      if(node.leftDelim.startsWith("\\left")) return ` ${node.leftDelim} ${content} ${node.rightDelim}`;
      return `${node.leftDelim}${content}${node.rightDelim}`;
    }

  }
}

    case "Superscript": return `${toHwpEqn(node.base)}^{${toHwpEqn(node.exponent)}}`;
    case "Subscript": return `${toHwpEqn(node.base)}_{${toHwpEqn(node.sub)}}`;
    case "Integral": { let out=node.variant==="int"?"int":"oint"; if(node.lower) out+=`_${toHwpEqn(node.lower)}`; if(node.upper) out+=`^${toHwpEqn(node.upper)}`; if(node.body) out+=` { { ${toHwpEqn(node.body)} } }`; return out; }
    case "Summation": { let out="sum"; if(node.lower) out+=`_${toHwpEqn(node.lower)}`; if(node.upper) out+=`^${toHwpEqn(node.upper)}`; if(node.body) out+=` { ${toHwpEqn(node.body)} }`; return out; }
    case "Decorated": return `${node.decoType} ${toHwpEqn(node.child)}`;
    case "BeginEnv": { const rowStrs=node.rows.map(r=>{const colStr=unifyCaseRowHwp(r.map(e=>toHwpEqn(e)));return colStr.join(" & ");}).join(" # "); return `${node.envName}{${rowStrs}}`; }
    case "Bracket": {
      const content=toHwpEqn(node.content);
      if(node.leftDelim.startsWith("\\left")) { const c=node.leftDelim.slice(5); let left=`LEFT${c}`,right=""; if(node.rightDelim.startsWith("\\right")){const c2=node.rightDelim.slice(6);right=`RIGHT${c2}`;} return ` ${left} ${content} ${right}`; }
      if(node.leftDelim==="LEFT(") return ` ${node.leftDelim} ${content} ${node.rightDelim}`;
      return `${node.leftDelim}${content}${node.rightDelim}`;
    }
    default: return "";
  }
}

// ═══════════════════════════════════════════════════════════
// App Logic
// ═══════════════════════════════════════════════════════════
let mode = 'latex2hwp';

const inputArea = document.getElementById('input-area');
const outputArea = document.getElementById('output-area');
const inputLabel = document.getElementById('input-label');
const outputLabel = document.getElementById('output-label');
const preview = document.getElementById('preview');
const modeBtns = document.querySelectorAll('.mode-btn');
const convertBtn = document.getElementById('convert-btn');
const exampleChips = document.getElementById('example-chips');

const examples = {
  hwp2latex: [
    { label: 'x^2 + y^2', value: 'x^2 + y^2' },
    { label: 'y^2 over z', value: 'y^2 over z' },
    { label: 'int_1^2 {x^3}', value: 'int_1^2 {x^3}' },
    { label: 'sqrt {a + b}', value: 'sqrt {a + b}' },
    { label: 'sum_1^n {k^2}', value: 'sum_1^n {k^2}' },
    { label: 'pmatrix{1 & 2 # 3 & 4}', value: 'pmatrix{1 & 2 # 3 & 4}' },
  ],
  latex2hwp: [
    { label: 'x^{2} + y^{2}', value: 'x^{2} + y^{2}' },
    { label: '\\frac{y^2}{z}', value: '\\frac{y^2}{z}' },
    { label: '\\int_{1}^{2} {x^3}', value: '\\int_{1}^{2} {x^3}' },
    { label: '\\sqrt{a + b}', value: '\\sqrt{a + b}' },
    { label: '\\sum_{1}^{n} {k^2}', value: '\\sum_{1}^{n} {k^2}' },
    { label: '\\begin{cases} x=1 \\\\ y=2 \\end{cases}', value: '\\begin{cases} x=1 \\\\ y=2 \\end{cases}' },
  ]
};

function setMode(m) {
  mode = m;
  modeBtns.forEach(b => b.classList.toggle('active', b.dataset.mode === m));
  if (m === 'hwp2latex') { inputLabel.textContent = 'HWP Equation'; outputLabel.textContent = 'LaTeX'; inputArea.placeholder = 'x times 3 + y^2 over z'; }
  else { inputLabel.textContent = 'LaTeX'; outputLabel.textContent = 'HWP Equation'; inputArea.placeholder = '\\frac{y^2}{z} + \\int_{1}^{2} {x^3}'; }
  inputArea.value = ''; outputArea.value = ''; preview.innerHTML = '';
  renderExamples();
}

function renderExamples() {
  exampleChips.innerHTML = '';
  for (const ex of examples[mode]) {
    const chip = document.createElement('button');
    chip.className = 'example-chip';
    chip.textContent = ex.label;
    chip.addEventListener('click', () => { inputArea.value = ex.value; convert(); });
    exampleChips.appendChild(chip);
  }
}

function stripDollarSigns(s) {
  return s.replace(/^\$\$?/, '').replace(/\$\$?$/, '').trim();
}

function convert() {
  let input = inputArea.value.trim();
  if (!input) { outputArea.value = ''; preview.innerHTML = ''; return; }
  if (mode === 'latex2hwp') input = stripDollarSigns(input);
  try {
    let tokens, ast, result, latexForPreview;
    if (mode === 'hwp2latex') {
      tokens = tokenizeHwpEqn(input);
      ast = new HwpParser(tokens).parseExpression();
      result = toLatex(ast).trim();
      latexForPreview = result;
    } else {
      tokens = tokenizeLatex(input);
      ast = new LatexParser(tokens).parseExpression();
      result = toHwpEqn(ast).trim();
      latexForPreview = input;
    }
    outputArea.value = result;
    try {
      katex.render(latexForPreview, preview, { throwOnError: false, displayMode: true });
    } catch(e) {
      preview.innerHTML = `<span class="preview-error">Preview not available</span>`;
    }
  } catch(e) {
    outputArea.value = 'Error: ' + e.message;
    preview.innerHTML = `<span class="preview-error">${e.message}</span>`;
  }
}

function handleCopy(btn, textarea) {
  const text = textarea.value.trim();
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    btn.classList.add('copied');
    btn.querySelector('span').textContent = 'Copied!';
    btn.querySelector('svg').innerHTML = '<polyline points="20 6 9 17 4 12"/>';
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.querySelector('span').textContent = 'Copy';
      btn.querySelector('svg').innerHTML = '<rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>';
    }, 1500);
  });
}

document.getElementById('copy-input').addEventListener('click', function() { handleCopy(this, inputArea); });
document.getElementById('copy-output').addEventListener('click', function() { handleCopy(this, outputArea); });

modeBtns.forEach(b => b.addEventListener('click', () => setMode(b.dataset.mode)));
convertBtn.addEventListener('click', convert);
inputArea.addEventListener('input', convert);
setMode('latex2hwp');
</script>
